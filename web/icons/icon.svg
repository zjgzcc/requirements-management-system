<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  
  <!-- Document icon -->
  <g transform="translate(106, 106)" fill="white">
    <!-- Document shape -->
    <path d="M 0 0 L 200 0 L 300 100 L 300 300 L 0 300 Z" fill="white" opacity="0.95"/>
    
    <!-- Folded corner -->
    <path d="M 200 0 L 300 0 L 300 100 Z" fill="#e8e8e8"/>
    
    <!-- Lines representing text -->
    <rect x="40" y="50" width="220" height="20" rx="4" fill="#667eea" opacity="0.8"/>
    <rect x="40" y="90" width="220" height="20" rx="4" fill="#667eea" opacity="0.6"/>
    <rect x="40" y="130" width="220" height="20" rx="4" fill="#667eea" opacity="0.4"/>
    <rect x="40" y="170" width="160" height="20" rx="4" fill="#667eea" opacity="0.3"/>
    
    <!-- Check mark -->
    <circle cx="230" cy="230" r="60" fill="#667eea" opacity="0.2"/>
    <path d="M 200 230 L 220 250 L 260 210" stroke="#667eea" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
