<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF OCR 系统 - 智能文字识别</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background: #eef2ff;
            border-color: #764ba2;
        }
        
        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-cancel {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .btn-download {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        
        .file-info {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .file-info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .file-info-item:last-child {
            border-bottom: none;
        }
        
        .progress-container {
            margin: 20px 0;
        }
        
        .progress-bar {
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
            min-width: 40px;
        }
        
        .progress-text {
            text-align: center;
            font-size: 1.1em;
            color: #333;
            margin-bottom: 10px;
        }
        
        .stage-indicator {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            position: relative;
        }
        
        .stage-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: #e0e0e0;
            transform: translateY(-50%);
            z-index: 0;
        }
        
        .stage {
            position: relative;
            z-index: 1;
            text-align: center;
            flex: 1;
        }
        
        .stage-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #e0e0e0;
            margin: 0 auto 8px;
            transition: all 0.3s;
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .stage.active .stage-dot {
            background: #667eea;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
        }
        
        .stage.completed .stage-dot {
            background: #4caf50;
        }
        
        .stage-label {
            font-size: 0.85em;
            color: #666;
        }
        
        .stage.active .stage-label {
            color: #667eea;
            font-weight: bold;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin: 5px;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-processing {
            background: #cce5ff;
            color: #004085;
        }
        
        .status-completed {
            background: #d4edda;
            color: #155724;
        }
        
        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }
        
        .task-list {
            margin-top: 20px;
        }
        
        .task-item {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .task-info {
            flex: 1;
        }
        
        .task-actions {
            display: flex;
            gap: 10px;
        }
        
        .eta-info {
            background: #fff8e1;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #ffc107;
        }
        
        .hidden {
            display: none;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 PDF OCR 系统</h1>
            <p>智能文字识别 · 支持中文和英文 · 实时进度追踪</p>
        </div>
        
        <!-- 上传区域 -->
        <div class="card">
            <h2 style="margin-bottom: 20px;">上传 PDF 文件</h2>
            
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <h3>点击或拖拽上传 PDF 文件</h3>
                <p style="color: #666; margin-top: 10px;">支持中文和英文文字识别</p>
                <input type="file" id="fileInput" accept=".pdf" style="display: none;">
            </div>
            
            <div id="fileInfo" class="file-info hidden">
                <h3 style="margin-bottom: 10px;">📋 文件信息</h3>
                <div class="file-info-item">
                    <span>文件名:</span>
                    <span id="fileName">-</span>
                </div>
                <div class="file-info-item">
                    <span>文件大小:</span>
                    <span id="fileSize">-</span>
                </div>
                <div class="file-info-item">
                    <span>总页数:</span>
                    <span id="totalPages">-</span>
                </div>
                <div class="file-info-item">
                    <span>预估时间:</span>
                    <span id="estimatedTime">-</span>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" id="startBtn" disabled onclick="startProcessing()">
                    🚀 开始处理
                </button>
            </div>
        </div>
        
        <!-- 处理进度区域 -->
        <div class="card hidden" id="progressCard">
            <h2 style="margin-bottom: 20px;">⚙️ 处理进度</h2>
            
            <div style="margin-bottom: 15px;">
                <span class="status-badge" id="statusBadge">处理中</span>
                <span id="taskId" style="color: #666; font-size: 0.9em; margin-left: 10px;"></span>
            </div>
            
            <!-- 阶段指示器 -->
            <div class="stage-indicator">
                <div class="stage" id="stage-uploaded">
                    <div class="stage-dot"></div>
                    <div class="stage-label">已上传</div>
                </div>
                <div class="stage" id="stage-analyzing">
                    <div class="stage-dot"></div>
                    <div class="stage-label">分析中</div>
                </div>
                <div class="stage" id="stage-ocr">
                    <div class="stage-dot"></div>
                    <div class="stage-label">OCR 中</div>
                </div>
                <div class="stage" id="stage-optimizing">
                    <div class="stage-dot"></div>
                    <div class="stage-label">优化中</div>
                </div>
                <div class="stage" id="stage-completed">
                    <div class="stage-dot"></div>
                    <div class="stage-label">已完成</div>
                </div>
            </div>
            
            <!-- 进度条 -->
            <div class="progress-container">
                <div class="progress-text" id="progressText">
                    进度：0% (0/0 页)
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%;">0%</div>
                </div>
            </div>
            
            <!-- 预估时间 -->
            <div class="eta-info hidden" id="etaInfo">
                <strong>⏱️ 预估剩余时间:</strong> <span id="etaTime">计算中...</span>
                <div style="margin-top: 5px; font-size: 0.9em; color: #666;">
                    当前速度：<span id="processingSpeed">-</span> 秒/页
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-cancel" id="cancelBtn" onclick="cancelTask()">
                    ❌ 取消任务
                </button>
                <button class="btn btn-download hidden" id="downloadBtn" onclick="downloadFile()">
                    📥 下载结果
                </button>
                <button class="btn" onclick="resetSystem()" style="margin-left: 10px;">
                    🔄 处理新文件
                </button>
            </div>
            
            <!-- 错误信息 -->
            <div class="alert alert-error hidden" id="errorAlert"></div>
        </div>
        
        <!-- 任务列表 -->
        <div class="card">
            <h2 style="margin-bottom: 20px;">📝 历史任务</h2>
            <button class="btn" onclick="loadTaskList()" style="margin-bottom: 15px;">
                🔄 刷新列表
            </button>
            <div class="task-list" id="taskList">
                <p style="color: #666; text-align: center;">点击刷新加载任务列表</p>
            </div>
        </div>
    </div>
    
    <script>
        // 全局变量
        let currentTaskId = null;
        let progressInterval = null;
        let uploadedFile = null;
        
        // API 基础 URL
        const API_BASE = window.location.origin;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            setupUploadArea();
            loadTaskList();
        });
        
        // 设置上传区域
        function setupUploadArea() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            
            uploadArea.addEventListener('click', () => fileInput.click());
            
            fileInput.addEventListener('change', handleFileSelect);
            
            // 拖拽上传
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFile(files[0]);
                }
            });
        }
        
        // 处理文件选择
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        }
        
        // 处理文件
        async function handleFile(file) {
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                alert('请上传 PDF 文件！');
                return;
            }
            
            uploadedFile = file;
            
            // 显示文件信息
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatFileSize(file.size);
            document.getElementById('totalPages').textContent = '分析中...';
            document.getElementById('estimatedTime').textContent = '计算中...';
            document.getElementById('fileInfo').classList.remove('hidden');
            document.getElementById('startBtn').disabled = false;
            
            // 上传文件
            await uploadFile(file);
        }
        
        // 上传文件
        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    currentTaskId = data.task_id;
                    document.getElementById('taskId').textContent = `ID: ${currentTaskId.substring(0, 8)}...`;
                    document.getElementById('totalPages').textContent = data.total_pages || '未知';
                    
                    // 获取详细文件信息
                    await loadFileInfo(currentTaskId);
                    
                    showAlert('文件上传成功！', 'success');
                } else {
                    showAlert(`上传失败：${data.detail}`, 'error');
                    document.getElementById('startBtn').disabled = true;
                }
            } catch (error) {
                showAlert(`上传失败：${error.message}`, 'error');
                document.getElementById('startBtn').disabled = true;
            }
        }
        
        // 加载文件信息
        async function loadFileInfo(taskId) {
            try {
                const response = await fetch(`${API_BASE}/fileinfo/${taskId}`);
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('fileSize').textContent = `${data.file_size_mb} MB`;
                    document.getElementById('totalPages').textContent = data.total_pages;
                    document.getElementById('estimatedTime').textContent = data.estimated_time_formatted || '未知';
                }
            } catch (error) {
                console.error('获取文件信息失败:', error);
            }
        }
        
        // 开始处理
        async function startProcessing() {
            if (!currentTaskId) {
                alert('请先上传文件！');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/process/${currentTaskId}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 显示进度卡片
                    document.getElementById('progressCard').classList.remove('hidden');
                    document.getElementById('cancelBtn').classList.remove('hidden');
                    document.getElementById('downloadBtn').classList.add('hidden');
                    document.getElementById('errorAlert').classList.add('hidden');
                    
                    // 开始轮询进度
                    startProgressPolling();
                    
                    // 滚动到进度区域
                    document.getElementById('progressCard').scrollIntoView({ behavior: 'smooth' });
                } else {
                    showAlert(`处理失败：${data.detail}`, 'error');
                }
            } catch (error) {
                showAlert(`处理失败：${error.message}`, 'error');
            }
        }
        
        // 开始轮询进度
        function startProgressPolling() {
            if (progressInterval) {
                clearInterval(progressInterval);
            }
            
            updateProgress();
            progressInterval = setInterval(updateProgress, 1000);
        }
        
        // 更新进度
        async function updateProgress() {
            if (!currentTaskId) return;
            
            try {
                const response = await fetch(`${API_BASE}/progress/${currentTaskId}`);
                const data = await response.json();
                
                if (!response.ok) {
                    return;
                }
                
                // 更新状态徽章
                const statusBadge = document.getElementById('statusBadge');
                statusBadge.textContent = data.stage_cn || data.status;
                statusBadge.className = 'status-badge';
                
                if (data.status === 'processing') {
                    statusBadge.classList.add('status-processing');
                } else if (data.status === 'completed') {
                    statusBadge.classList.add('status-completed');
                } else if (data.status === 'cancelled') {
                    statusBadge.classList.add('status-cancelled');
                } else if (data.status === 'failed') {
                    statusBadge.classList.add('status-failed');
                }
                
                // 更新进度条
                const progress = data.progress || 0;
                const progressFill = document.getElementById('progressFill');
                const progressText = document.getElementById('progressText');
                
                progressFill.style.width = `${progress}%`;
                progressFill.textContent = `${Math.round(progress)}%`;
                
                progressText.textContent = `进度：${Math.round(progress)}% (${data.processed_pages || 0}/${data.total_pages || 0} 页)`;
                
                // 更新阶段指示器
                updateStageIndicator(data.stage);
                
                // 更新预估时间
                if (data.status === 'processing' && data.eta_seconds > 0) {
                    document.getElementById('etaInfo').classList.remove('hidden');
                    document.getElementById('etaTime').textContent = data.eta_formatted || '计算中...';
                    document.getElementById('processingSpeed').textContent = data.avg_time_per_page || '-';
                } else {
                    document.getElementById('etaInfo').classList.add('hidden');
                }
                
                // 处理完成
                if (data.status === 'completed') {
                    clearInterval(progressInterval);
                    document.getElementById('cancelBtn').classList.add('hidden');
                    document.getElementById('downloadBtn').classList.remove('hidden');
                    showAlert('OCR 处理完成！', 'success');
                    loadTaskList();
                }
                
                // 处理取消
                if (data.status === 'cancelled') {
                    clearInterval(progressInterval);
                    document.getElementById('cancelBtn').classList.add('hidden');
                    showAlert('任务已取消', 'info');
                }
                
                // 处理失败
                if (data.status === 'failed') {
                    clearInterval(progressInterval);
                    document.getElementById('cancelBtn').classList.add('hidden');
                    document.getElementById('errorAlert').textContent = `错误：${data.error || '未知错误'}`;
                    document.getElementById('errorAlert').classList.remove('hidden');
                }
                
            } catch (error) {
                console.error('获取进度失败:', error);
            }
        }
        
        // 更新阶段指示器
        function updateStageIndicator(stage) {
            const stages = ['uploaded', 'analyzing', 'ocr', 'optimizing', 'completed'];
            
            stages.forEach(s => {
                const element = document.getElementById(`stage-${s}`);
                if (element) {
                    element.classList.remove('active', 'completed');
                    
                    const stageIndex = stages.indexOf(stage);
                    const currentIndex = stages.indexOf(s);
                    
                    if (currentIndex < stageIndex) {
                        element.classList.add('completed');
                    } else if (currentIndex === stageIndex) {
                        element.classList.add('active');
                    }
                }
            });
        }
        
        // 取消任务
        async function cancelTask() {
            if (!currentTaskId) return;
            
            if (!confirm('确定要取消当前任务吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/cancel/${currentTaskId}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('任务已取消', 'info');
                    clearInterval(progressInterval);
                    document.getElementById('cancelBtn').classList.add('hidden');
                    
                    // 更新 UI
                    const statusBadge = document.getElementById('statusBadge');
                    statusBadge.textContent = '已取消';
                    statusBadge.className = 'status-badge status-cancelled';
                } else {
                    showAlert(`取消失败：${data.detail}`, 'error');
                }
            } catch (error) {
                showAlert(`取消失败：${error.message}`, 'error');
            }
        }
        
        // 下载文件
        function downloadFile() {
            if (!currentTaskId) return;
            
            window.location.href = `${API_BASE}/download/${currentTaskId}`;
        }
        
        // 重置系统
        function resetSystem() {
            currentTaskId = null;
            uploadedFile = null;
            
            if (progressInterval) {
                clearInterval(progressInterval);
            }
            
            document.getElementById('fileInput').value = '';
            document.getElementById('fileInfo').classList.add('hidden');
            document.getElementById('progressCard').classList.add('hidden');
            document.getElementById('startBtn').disabled = true;
            document.getElementById('uploadArea').style.display = 'block';
            
            // 重置进度
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressFill').textContent = '0%';
            document.getElementById('progressText').textContent = '进度：0% (0/0 页)';
            
            // 重置阶段
            document.querySelectorAll('.stage').forEach(el => {
                el.classList.remove('active', 'completed');
            });
            
            loadTaskList();
        }
        
        // 加载任务列表
        async function loadTaskList() {
            try {
                const response = await fetch(`${API_BASE}/tasks`);
                const data = await response.json();
                
                const taskList = document.getElementById('taskList');
                
                if (data.tasks && data.tasks.length > 0) {
                    let html = '';
                    data.tasks.forEach(task => {
                        const statusClass = `status-${task.status}`;
                        const statusText = task.status === 'completed' ? '✅ 完成' : 
                                          task.status === 'processing' ? '⏳ 处理中' :
                                          task.status === 'cancelled' ? '❌ 已取消' :
                                          task.status === 'failed' ? '⚠️ 失败' : '⏸️ 等待';
                        
                        html += `
                            <div class="task-item">
                                <div class="task-info">
                                    <strong>${task.filename || '未知文件'}</strong>
                                    <div style="color: #666; font-size: 0.9em; margin-top: 5px;">
                                        ${statusText} · ${task.total_pages}页 · ${Math.round(task.progress)}%
                                    </div>
                                </div>
                                <div class="task-actions">
                                    ${task.status === 'completed' ? 
                                        `<button class="btn btn-download" onclick="window.location.href='${API_BASE}/download/${task.task_id}'">下载</button>` : 
                                        ''}
                                    <button class="btn btn-danger" onclick="deleteTask('${task.task_id}')">删除</button>
                                </div>
                            </div>
                        `;
                    });
                    taskList.innerHTML = html;
                } else {
                    taskList.innerHTML = '<p style="color: #666; text-align: center;">暂无任务</p>';
                }
            } catch (error) {
                console.error('加载任务列表失败:', error);
            }
        }
        
        // 删除任务
        async function deleteTask(taskId) {
            if (!confirm('确定要删除此任务吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/task/${taskId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showAlert('任务已删除', 'success');
                    loadTaskList();
                    
                    if (taskId === currentTaskId) {
                        resetSystem();
                    }
                } else {
                    showAlert('删除失败', 'error');
                }
            } catch (error) {
                showAlert(`删除失败：${error.message}`, 'error');
            }
        }
        
        // 显示提示消息
        function showAlert(message, type = 'info') {
            // 创建临时提示
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.position = 'fixed';
            alert.style.top = '20px';
            alert.style.right = '20px';
            alert.style.zIndex = '1000';
            alert.style.minWidth = '300px';
            
            document.body.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 3000);
        }
        
        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) {
                return bytes + ' B';
            } else if (bytes < 1024 * 1024) {
                return (bytes / 1024).toFixed(2) + ' KB';
            } else {
                return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
            }
        }
    </script>
</body>
</html>
