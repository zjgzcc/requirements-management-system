<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线 - 需求管理系统</title>
    <link rel="stylesheet" href="mobile.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .offline-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 12px;
        }
        
        .offline-message {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .offline-tips {
            background: #f8f9ff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }
        
        .offline-tips h3 {
            font-size: 14px;
            color: #667eea;
            margin-bottom: 12px;
        }
        
        .offline-tips ul {
            list-style: none;
            padding: 0;
        }
        
        .offline-tips li {
            font-size: 13px;
            color: #666;
            padding: 6px 0;
            padding-left: 20px;
            position: relative;
        }
        
        .offline-tips li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #4caf50;
        }
        
        .btn-retry {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 160px;
            min-height: 44px;
        }
        
        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-retry:active {
            transform: translateY(0);
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #999;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f44336;
            animation: pulse 2s infinite;
        }
        
        .status-dot.online {
            background: #4caf50;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        /* 移动端优化 */
        @media (max-width: 767px) {
            .offline-container {
                padding: 30px 20px;
            }
            
            .offline-icon {
                font-size: 60px;
            }
            
            .offline-title {
                font-size: 20px;
            }
            
            .offline-message {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1 class="offline-title">当前处于离线状态</h1>
        <p class="offline-message">
            检测到网络连接已断开，您可以查看已缓存的内容，或在网络恢复后继续使用完整功能。
        </p>
        
        <div class="offline-tips">
            <h3>💡 离线模式下您可以:</h3>
            <ul>
                <li>查看已缓存的页面内容</li>
                <li>浏览之前访问过的需求文档</li>
                <li>查看本地保存的数据</li>
                <li>等待网络自动恢复</li>
            </ul>
        </div>
        
        <button class="btn-retry" onclick="retryConnection()">
            🔄 重试连接
        </button>
        
        <div class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">正在检测网络...</span>
        </div>
    </div>

    <script>
        // 网络状态检测
        function updateStatus() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if (navigator.onLine) {
                statusDot.classList.add('online');
                statusText.textContent = '网络已连接';
                
                // 自动跳转回首页
                setTimeout(() => {
                    window.location.href = '/home.html';
                }, 1500);
            } else {
                statusDot.classList.remove('online');
                statusText.textContent = '网络已断开';
            }
        }

        // 重试连接
        function retryConnection() {
            const btn = document.querySelector('.btn-retry');
            btn.disabled = true;
            btn.textContent = '⏳ 正在重试...';
            
            updateStatus();
            
            if (navigator.onLine) {
                window.location.href = '/home.html';
            } else {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.textContent = '🔄 重试连接';
                }, 2000);
            }
        }

        // 监听网络状态变化
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);

        // 初始化状态
        updateStatus();

        // 定期检查网络状态
        setInterval(updateStatus, 5000);

        // Service Worker 注册检查
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistration().then(registration => {
                if (registration) {
                    console.log('Service Worker 已注册，支持离线访问');
                }
            });
        }
    </script>
</body>
</html>
