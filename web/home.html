<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 需求管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* 顶部导航栏 */
        .header {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            padding: 0 30px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 32px; }
        .logo h1 { color: #333; font-size: 20px; font-weight: 600; }
        .user-menu { display: flex; align-items: center; gap: 20px; }
        .current-user {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 16px; background: #f5f5f5;
            border-radius: 8px; color: #333; font-size: 14px;
        }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 600; font-size: 14px;
        }
        .user-actions { display: flex; gap: 10px; }
        .btn-outline {
            padding: 8px 16px; border: 1px solid #667eea;
            background: transparent; color: #667eea;
            border-radius: 6px; cursor: pointer; font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn-outline:hover { background: #667eea; color: white; }
        .btn-danger {
            padding: 8px 16px; border: 1px solid #e74c3c;
            background: transparent; color: #e74c3c;
            border-radius: 6px; cursor: pointer; font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn-danger:hover { background: #e74c3c; color: white; }
        
        /* 主内容区 */
        .main-container {
            margin-top: 70px;
            padding: 30px;
            min-height: calc(100vh - 70px);
        }
        
        /* 欢迎区域 */
        .welcome-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        .welcome-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        .welcome-subtitle {
            font-size: 14px;
            color: #666;
        }
        
        /* 统计卡片区 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-4px);
        }
        .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        
        /* 内容卡片区 */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }
        .content-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e1e1e1;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .card-more {
            font-size: 13px;
            color: #667eea;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .card-more:hover {
            color: #764ba2;
        }
        
        /* 列表项 */
        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .list-icon.project { background: #dbeafe; }
        .list-icon.requirement { background: #d1fae5; }
        .list-icon.task { background: #fef3c7; }
        .list-content {
            flex: 1;
        }
        .list-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }
        .list-desc {
            font-size: 12px;
            color: #666;
        }
        .list-meta {
            text-align: right;
        }
        .list-date {
            font-size: 12px;
            color: #999;
        }
        
        /* 快捷操作 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .quick-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 14px;
            color: #333;
        }
        .quick-action-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .empty-state-title {
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        /* 角色标签 */
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            margin-left: 10px;
        }
        .role-badge.admin {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .role-badge.user {
            background: #d1fae5;
            color: #065f46;
        }
        .role-badge.guest {
            background: #f3f4f6;
            color: #374151;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🦞</span>
            <h1>需求管理系统</h1>
        </div>
        <div class="user-menu">
            <div class="current-user">
                <div class="user-avatar" id="userAvatar"></div>
                <span id="currentUsername"></span>
                <span class="role-badge" id="userRole"></span>
            </div>
            <div class="user-actions">
                <button class="btn-outline" onclick="window.location.href='requirements.html'">进入系统</button>
                <button class="btn-danger" onclick="logout()">退出登录</button>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <div class="main-container">
        <!-- 欢迎区域 -->
        <div class="welcome-section">
            <h1 class="welcome-title" id="welcomeTitle">加载中...</h1>
            <p class="welcome-subtitle" id="welcomeSubtitle">正在获取您的工作台信息</p>
        </div>

        <!-- 统计卡片区 -->
        <div class="stats-grid" id="statsGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载统计数据...</p>
            </div>
        </div>

        <!-- 内容卡片区 -->
        <div class="content-grid">
            <!-- 我的项目 -->
            <div class="content-card">
                <div class="card-header">
                    <h2 class="card-title">📁 我的项目</h2>
                    <span class="card-more" onclick="window.location.href='requirements.html'">查看全部 →</span>
                </div>
                <div id="projectsList">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <!-- 待办事项 -->
            <div class="content-card">
                <div class="card-header">
                    <h2 class="card-title">✅ 待办事项</h2>
                    <span class="card-more" onclick="window.location.href='requirements.html'">查看全部 →</span>
                </div>
                <div id="tasksList">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <!-- 最近活动 -->
            <div class="content-card">
                <div class="card-header">
                    <h2 class="card-title">📝 最近活动</h2>
                    <span class="card-more" onclick="window.location.href='requirements.html'">查看全部 →</span>
                </div>
                <div id="activitiesList">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <!-- 快捷操作 -->
            <div class="content-card">
                <div class="card-header">
                    <h2 class="card-title">⚡ 快捷操作</h2>
                </div>
                <div class="quick-actions">
                    <button class="quick-action-btn" onclick="window.location.href='requirements.html'">
                        📋 新建需求
                    </button>
                    <button class="quick-action-btn" onclick="window.location.href='requirements.html'">
                        🧪 新建用例
                    </button>
                    <button class="quick-action-btn" onclick="window.location.href='dashboard.html'">
                        👥 用户管理
                    </button>
                    <button class="quick-action-btn" onclick="window.location.href='requirements.html'">
                        🔗 追踪矩阵
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://8.215.93.217:8001/api';

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadDashboard();
        });

        // 检查登录状态
        async function checkAuth() {
            const session = sessionStorage.getItem('currentUser');
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(session);
            document.getElementById('currentUsername').textContent = user.username;
            document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
            
            // 设置角色标签
            const roleBadge = document.getElementById('userRole');
            if (user.role === 'admin') {
                roleBadge.textContent = '项目管理员';
                roleBadge.className = 'role-badge admin';
            } else {
                roleBadge.textContent = '普通用户';
                roleBadge.className = 'role-badge user';
            }

            // 设置欢迎语
            const hour = new Date().getHours();
            let greeting = '早上好';
            if (hour >= 12 && hour < 18) greeting = '下午好';
            else if (hour >= 18) greeting = '晚上好';
            
            document.getElementById('welcomeTitle').textContent = `${greeting}，${user.username}！`;
        }

        // 加载仪表盘数据
        async function loadDashboard() {
            try {
                // 加载项目列表
                await loadProjects();
                
                // 加载统计数据
                await loadStats();
                
                // 加载最近活动
                await loadActivities();
                
                // 加载待办事项
                await loadTasks();
            } catch (error) {
                console.error('加载仪表盘失败:', error);
            }
        }

        // 加载项目列表
        async function loadProjects() {
            try {
                const response = await fetch(`${API_BASE}/projects`);
                const data = await response.json();
                
                const projectsList = document.getElementById('projectsList');
                
                if (data.success && data.data.length > 0) {
                    projectsList.innerHTML = data.data.slice(0, 5).map(project => `
                        <div class="list-item">
                            <div class="list-icon project">📁</div>
                            <div class="list-content">
                                <div class="list-title">${project.name}</div>
                                <div class="list-desc">${project.description || '暂无描述'}</div>
                            </div>
                            <div class="list-meta">
                                <div class="list-date">${new Date(project.createdAt).toLocaleDateString('zh-CN')}</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    projectsList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📁</div>
                            <div class="empty-state-title">暂无项目</div>
                            <p>点击"进入系统"创建第一个项目</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载项目失败:', error);
                document.getElementById('projectsList').innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/system/stats`);
                const data = await response.json();
                
                const statsGrid = document.getElementById('statsGrid');
                
                if (data.success) {
                    const stats = data.data;
                    statsGrid.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-icon">📋</div>
                            <div class="stat-value">${stats.totalRequirements || 0}</div>
                            <div class="stat-label">总需求数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🧪</div>
                            <div class="stat-value">${stats.totalTestcases || 0}</div>
                            <div class="stat-label">总用例数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">📁</div>
                            <div class="stat-value">${stats.totalProjects || 0}</div>
                            <div class="stat-label">项目数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🔗</div>
                            <div class="stat-value">${stats.traceCoverage || 0}%</div>
                            <div class="stat-label">追踪覆盖率</div>
                        </div>
                    `;
                } else {
                    statsGrid.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-icon">📋</div>
                            <div class="stat-value">-</div>
                            <div class="stat-label">总需求数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🧪</div>
                            <div class="stat-value">-</div>
                            <div class="stat-label">总用例数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">📁</div>
                            <div class="stat-value">-</div>
                            <div class="stat-label">项目数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🔗</div>
                            <div class="stat-value">-</div>
                            <div class="stat-label">追踪覆盖率</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载统计失败:', error);
                document.getElementById('statsGrid').innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        // 加载最近活动
        async function loadActivities() {
            // 模拟活动数据
            const activitiesList = document.getElementById('activitiesList');
            activitiesList.innerHTML = `
                <div class="list-item">
                    <div class="list-icon requirement">📋</div>
                    <div class="list-content">
                        <div class="list-title">系统初始化完成</div>
                        <div class="list-desc">需求管理系统已就绪</div>
                    </div>
                    <div class="list-meta">
                        <div class="list-date">刚刚</div>
                    </div>
                </div>
                <div class="list-item">
                    <div class="list-icon task">✨</div>
                    <div class="list-content">
                        <div class="list-title">新功能：需求详情页</div>
                        <div class="list-desc">左右分栏布局，P0/P1/P2 字段分层</div>
                    </div>
                    <div class="list-meta">
                        <div class="list-date">今天</div>
                    </div>
                </div>
            `;
        }

        // 加载待办事项
        async function loadTasks() {
            const tasksList = document.getElementById('tasksList');
            tasksList.innerHTML = `
                <div class="list-item">
                    <div class="list-icon task">📋</div>
                    <div class="list-content">
                        <div class="list-title">完善需求管理功能</div>
                        <div class="list-desc">继续开发 P0 核心功能</div>
                    </div>
                    <div class="list-meta">
                        <div class="list-date">进行中</div>
                    </div>
                </div>
            `;
        }

        // 退出登录
        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
