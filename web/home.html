<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 需求管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* 顶部导航栏 */
        .header {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            padding: 0 30px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 32px; }
        .logo h1 { color: #333; font-size: 20px; font-weight: 600; }
        .user-menu { display: flex; align-items: center; gap: 20px; }
        .current-user {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 16px; background: #f5f5f5;
            border-radius: 8px; color: #333; font-size: 14px;
        }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 600; font-size: 14px;
        }
        .user-actions { display: flex; gap: 10px; }
        .btn-outline {
            padding: 8px 16px; border: 1px solid #667eea;
            background: transparent; color: #667eea;
            border-radius: 6px; cursor: pointer; font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn-outline:hover { background: #667eea; color: white; }
        .btn-danger {
            padding: 8px 16px; border: 1px solid #e74c3c;
            background: transparent; color: #e74c3c;
            border-radius: 6px; cursor: pointer; font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn-danger:hover { background: #e74c3c; color: white; }
        
        /* 主内容区 */
        .main-container {
            margin-top: 70px;
            padding: 30px;
            min-height: calc(100vh - 70px);
        }
        
        /* 欢迎区域 */
        .welcome-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        .welcome-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        .welcome-subtitle {
            font-size: 14px;
            color: #666;
        }
        
        /* 统计卡片区 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-4px);
        }
        .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        
        /* 内容卡片区 */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .content-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        /* 图表容器 */
        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
            margin-top: 15px;
        }
        
        /* 待办事项样式 */
        .todo-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.2s;
        }
        .todo-item:last-child {
            border-bottom: none;
        }
        .todo-item:hover {
            background: #f9f9ff;
            margin: 0 -10px;
            padding: 12px 10px;
            border-radius: 6px;
        }
        .todo-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s;
        }
        .todo-checkbox.checked {
            background: #667eea;
        }
        .todo-checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
        }
        .todo-content {
            flex: 1;
        }
        .todo-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }
        .todo-item.completed .todo-title {
            text-decoration: line-through;
            color: #999;
        }
        .todo-meta {
            font-size: 12px;
            color: #666;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .todo-priority {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        .todo-priority.high {
            background: #fee2e2;
            color: #991b1b;
        }
        .todo-priority.medium {
            background: #fef3c7;
            color: #92400e;
        }
        .todo-priority.low {
            background: #d1fae5;
            color: #065f46;
        }
        
        /* 活动流样式 */
        .activity-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
            position: relative;
        }
        .activity-item:last-child {
            border-bottom: none;
        }
        .activity-item::before {
            content: '';
            position: absolute;
            left: 19px;
            top: 40px;
            bottom: -12px;
            width: 2px;
            background: #e1e1e1;
        }
        .activity-item:last-child::before {
            display: none;
        }
        .activity-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .activity-content {
            flex: 1;
        }
        .activity-text {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
        }
        .activity-text strong {
            color: #667eea;
        }
        .activity-time {
            font-size: 12px;
            color: #999;
        }
        .activity-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
        }
        .activity-type.create { background: #d1fae5; color: #065f46; }
        .activity-type.update { background: #dbeafe; color: #1e40af; }
        .activity-type.delete { background: #fee2e2; color: #991b1b; }
        .activity-type.execute { background: #fef3c7; color: #92400e; }
        
        /* 快速操作面板增强 */
        .quick-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 14px;
            color: #333;
            min-height: 100px;
        }
        .quick-action-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        .quick-action-icon {
            font-size: 32px;
        }
        .quick-action-label {
            font-size: 13px;
            font-weight: 500;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e1e1e1;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .card-more {
            font-size: 13px;
            color: #667eea;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .card-more:hover {
            color: #764ba2;
        }
        
        /* 列表项 */
        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .list-icon.project { background: #dbeafe; }
        .list-icon.requirement { background: #d1fae5; }
        .list-icon.task { background: #fef3c7; }
        .list-content {
            flex: 1;
        }
        .list-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }
        .list-desc {
            font-size: 12px;
            color: #666;
        }
        .list-meta {
            text-align: right;
        }
        .list-date {
            font-size: 12px;
            color: #999;
        }
        
        /* 快捷操作 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .quick-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 14px;
            color: #333;
        }
        .quick-action-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .empty-state-title {
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        /* 角色标签 */
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            margin-left: 10px;
        }
        .role-badge.admin {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .role-badge.user {
            background: #d1fae5;
            color: #065f46;
        }
        .role-badge.guest {
            background: #f3f4f6;
            color: #374151;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🦞</span>
            <h1>需求管理系统</h1>
        </div>
        <div class="user-menu">
            <div class="current-user">
                <div class="user-avatar" id="userAvatar"></div>
                <span id="currentUsername"></span>
                <span class="role-badge" id="userRole"></span>
            </div>
            <div class="user-actions">
                <button class="btn-outline" onclick="window.location.href='requirements.html'">进入系统</button>
                <button class="btn-danger" onclick="logout()">退出登录</button>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <div class="main-container">
        <!-- 欢迎区域 -->
        <div class="welcome-section">
            <h1 class="welcome-title" id="welcomeTitle">加载中...</h1>
            <p class="welcome-subtitle" id="welcomeSubtitle">正在获取您的工作台信息</p>
        </div>

        <!-- 统计卡片区 -->
        <div class="stats-grid" id="statsGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载统计数据...</p>
            </div>
        </div>

        <!-- 图表卡片区 -->
        <div class="content-grid" style="grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));">
            <!-- 需求趋势图 -->
            <div class="content-card">
                <div class="card-header">
                    <h2 class="card-title">📈 需求趋势</h2>
                    <span class="card-more" onclick="loadRequirementTrend()">刷新</span>
                </div>
                <div class="chart-container" id="requirementTrendChart">
                    <div class="loading">加载图表...</div>
                </div>
            </div>

            <!-- 用例执行率 -->
            <div class="content-card">
                <div class="card-header">
                    <h2 class="card-title">🧪 用例执行率</h2>
                    <span class="card-more" onclick="loadExecutionRateChart()">刷新</span>
                </div>
                <div class="chart-container" id="executionRateChart">
                    <div class="loading">加载图表...</div>
                </div>
            </div>
        </div>

        <!-- 内容卡片区 -->
        <div class="content-grid">
            <!-- 我的项目 -->
            <div class="content-card">
                <div class="card-header">
                    <h2 class="card-title">📁 我的项目</h2>
                    <span class="card-more" onclick="window.location.href='requirements.html'">查看全部 →</span>
                </div>
                <div id="projectsList">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <!-- 待办事项 -->
            <div class="content-card">
                <div class="card-header">
                    <h2 class="card-title">✅ 待办事项</h2>
                    <span class="card-more" onclick="showAllTasks()">查看全部 →</span>
                </div>
                <div id="tasksList">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <!-- 最近活动 -->
            <div class="content-card">
                <div class="card-header">
                    <h2 class="card-title">📝 最近活动</h2>
                    <span class="card-more" onclick="showAllActivities()">查看全部 →</span>
                </div>
                <div id="activitiesList">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <!-- 快捷操作 -->
            <div class="content-card">
                <div class="card-header">
                    <h2 class="card-title">⚡ 快速操作</h2>
                </div>
                <div class="quick-actions">
                    <button class="quick-action-btn" onclick="quickCreate('requirement')">
                        <span class="quick-action-icon">📋</span>
                        <span class="quick-action-label">新建需求</span>
                    </button>
                    <button class="quick-action-btn" onclick="quickCreate('testcase')">
                        <span class="quick-action-icon">🧪</span>
                        <span class="quick-action-label">新建用例</span>
                    </button>
                    <button class="quick-action-btn" onclick="quickCreate('project')">
                        <span class="quick-action-icon">📁</span>
                        <span class="quick-action-label">新建项目</span>
                    </button>
                    <button class="quick-action-btn" onclick="window.location.href='trace-matrix.html'">
                        <span class="quick-action-icon">🔗</span>
                        <span class="quick-action-label">追踪矩阵</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://8.215.93.217:8001/api';

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadDashboard();
        });

        // 检查登录状态
        async function checkAuth() {
            const session = sessionStorage.getItem('currentUser');
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(session);
            document.getElementById('currentUsername').textContent = user.username;
            document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
            
            // 设置角色标签
            const roleBadge = document.getElementById('userRole');
            if (user.role === 'admin') {
                roleBadge.textContent = '项目管理员';
                roleBadge.className = 'role-badge admin';
            } else {
                roleBadge.textContent = '普通用户';
                roleBadge.className = 'role-badge user';
            }

            // 设置欢迎语
            const hour = new Date().getHours();
            let greeting = '早上好';
            if (hour >= 12 && hour < 18) greeting = '下午好';
            else if (hour >= 18) greeting = '晚上好';
            
            document.getElementById('welcomeTitle').textContent = `${greeting}，${user.username}！`;
        }

        // 加载仪表盘数据
        async function loadDashboard() {
            try {
                // 加载项目列表
                await loadProjects();
                
                // 加载统计数据
                await loadStats();
                
                // 加载图表
                await loadRequirementTrendChart();
                await loadExecutionRateChart();
                
                // 加载最近活动
                await loadActivities();
                
                // 加载待办事项
                await loadTasks();
            } catch (error) {
                console.error('加载仪表盘失败:', error);
            }
        }

        // 加载项目列表
        async function loadProjects() {
            try {
                const response = await fetch(`${API_BASE}/projects`);
                const data = await response.json();
                
                const projectsList = document.getElementById('projectsList');
                
                if (data.success && data.data.length > 0) {
                    projectsList.innerHTML = data.data.slice(0, 5).map(project => `
                        <div class="list-item">
                            <div class="list-icon project">📁</div>
                            <div class="list-content">
                                <div class="list-title">${project.name}</div>
                                <div class="list-desc">${project.description || '暂无描述'}</div>
                            </div>
                            <div class="list-meta">
                                <div class="list-date">${new Date(project.createdAt).toLocaleDateString('zh-CN')}</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    projectsList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📁</div>
                            <div class="empty-state-title">暂无项目</div>
                            <p>点击"进入系统"创建第一个项目</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载项目失败:', error);
                document.getElementById('projectsList').innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/dashboard/stats`);
                const data = await response.json();
                
                const statsGrid = document.getElementById('statsGrid');
                
                if (data.success) {
                    const stats = data.data.summary;
                    statsGrid.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-icon">📋</div>
                            <div class="stat-value">${stats.totalRequirements || 0}</div>
                            <div class="stat-label">总需求数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🧪</div>
                            <div class="stat-value">${stats.totalTestcases || 0}</div>
                            <div class="stat-label">总用例数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">📁</div>
                            <div class="stat-value">${stats.totalProjects || 0}</div>
                            <div class="stat-label">项目数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🔗</div>
                            <div class="stat-value">${stats.traceCoverage || 0}%</div>
                            <div class="stat-label">追踪覆盖率</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">✅</div>
                            <div class="stat-value">${stats.executionRate || 0}%</div>
                            <div class="stat-label">用例执行率</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">📊</div>
                            <div class="stat-value">${stats.passRate || 0}%</div>
                            <div class="stat-label">测试通过率</div>
                        </div>
                    `;
                } else {
                    statsGrid.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-icon">📋</div>
                            <div class="stat-value">-</div>
                            <div class="stat-label">总需求数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🧪</div>
                            <div class="stat-value">-</div>
                            <div class="stat-label">总用例数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">📁</div>
                            <div class="stat-value">-</div>
                            <div class="stat-label">项目数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🔗</div>
                            <div class="stat-value">-</div>
                            <div class="stat-label">追踪覆盖率</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">✅</div>
                            <div class="stat-value">-</div>
                            <div class="stat-label">用例执行率</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">📊</div>
                            <div class="stat-value">-</div>
                            <div class="stat-label">测试通过率</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载统计失败:', error);
                document.getElementById('statsGrid').innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        // 加载最近活动
        async function loadActivities() {
            try {
                const response = await fetch(`${API_BASE}/history?limit=10`);
                const data = await response.json();
                
                const activitiesList = document.getElementById('activitiesList');
                
                if (data.success && data.data.length > 0) {
                    const activities = data.data.slice(0, 8);
                    activitiesList.innerHTML = activities.map(activity => {
                        const typeClass = activity.action === 'create' ? 'create' : 
                                         activity.action === 'update' ? 'update' :
                                         activity.action === 'delete' ? 'delete' :
                                         activity.action === 'execute' ? 'execute' : 'update';
                        const typeText = activity.action === 'create' ? '创建' :
                                        activity.action === 'update' ? '更新' :
                                        activity.action === 'delete' ? '删除' :
                                        activity.action === 'execute' ? '执行' : '操作';
                        const itemType = activity.type === 'requirement' ? '需求' : '用例';
                        const timeAgo = getTimeAgo(new Date(activity.timestamp));
                        
                        return `
                            <div class="activity-item">
                                <div class="activity-avatar">${itemType.charAt(0)}</div>
                                <div class="activity-content">
                                    <div class="activity-text">
                                        <strong>${typeText}</strong>了 ${itemType}
                                        <span class="activity-type ${typeClass}">${typeText}</span>
                                    </div>
                                    <div class="activity-time">${timeAgo}</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    activitiesList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📝</div>
                            <div class="empty-state-title">暂无活动</div>
                            <p>开始使用系统来创建活动记录</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载活动失败:', error);
                // 显示示例活动
                const activitiesList = document.getElementById('activitiesList');
                activitiesList.innerHTML = generateSampleActivities();
            }
        }

        // 生成示例活动
        function generateSampleActivities() {
            const sampleActivities = [
                { action: 'create', type: 'requirement', text: '创建了需求 REQ-1', time: '刚刚' },
                { action: 'update', type: 'testcase', text: '更新了测试用例 TC-5', time: '10 分钟前' },
                { action: 'execute', type: 'testcase', text: '执行了测试用例 TC-3', time: '1 小时前' },
                { action: 'create', type: 'testcase', text: '创建了测试用例 TC-8', time: '2 小时前' },
                { action: 'update', type: 'requirement', text: '更新了需求 REQ-2', time: '3 小时前' }
            ];
            
            return sampleActivities.map(activity => {
                const typeClass = activity.action === 'create' ? 'create' : 
                                 activity.action === 'update' ? 'update' :
                                 activity.action === 'delete' ? 'delete' : 'execute';
                const typeText = activity.action === 'create' ? '创建' :
                                activity.action === 'update' ? '更新' :
                                activity.action === 'delete' ? '删除' : '执行';
                
                return `
                    <div class="activity-item">
                        <div class="activity-avatar">${activity.type === 'requirement' ? '📋' : '🧪'}</div>
                        <div class="activity-content">
                            <div class="activity-text">
                                <strong>${activity.text}</strong>
                                <span class="activity-type ${typeClass}">${typeText}</span>
                            </div>
                            <div class="activity-time">${activity.time}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 加载待办事项
        async function loadTasks() {
            try {
                // 从需求和用例中生成待办事项
                const [reqResponse, tcResponse] = await Promise.all([
                    fetch(`${API_BASE}/requirements`),
                    fetch(`${API_BASE}/testcases`)
                ]);
                
                const reqData = await reqResponse.json();
                const tcData = await tcResponse.json();
                
                const tasksList = document.getElementById('tasksList');
                const tasks = [];
                
                // 收集待办事项
                if (reqData.success) {
                    reqData.data.forEach(req => {
                        if (req.status === 'draft' || req.status === 'review') {
                            tasks.push({
                                id: req.id,
                                title: `${req.reqId || '需求'} - ${req.title || req.description?.substring(0, 30) || '未命名需求'}`,
                                type: 'requirement',
                                priority: req.priority || 'medium',
                                dueDate: req.createdAt,
                                completed: false
                            });
                        }
                    });
                }
                
                if (tcData.success) {
                    tcData.data.forEach(tc => {
                        if (tc.status === 'not_executed' || tc.status === 'failed') {
                            tasks.push({
                                id: tc.id,
                                title: `${tc.tcId || '用例'} - ${tc.title || tc.steps?.substring(0, 30) || '未命名用例'}`,
                                type: 'testcase',
                                priority: tc.priority || 'medium',
                                dueDate: tc.createdAt,
                                completed: tc.status === 'passed'
                            });
                        }
                    });
                }
                
                // 按优先级排序，取前 8 个
                const priorityOrder = { high: 0, medium: 1, low: 2 };
                tasks.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
                const topTasks = tasks.slice(0, 8);
                
                if (topTasks.length > 0) {
                    tasksList.innerHTML = topTasks.map(task => `
                        <div class="todo-item ${task.completed ? 'completed' : ''}" data-id="${task.id}" data-type="${task.type}">
                            <div class="todo-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask(this, '${task.id}', '${task.type}')"></div>
                            <div class="todo-content">
                                <div class="todo-title">${task.title}</div>
                                <div class="todo-meta">
                                    <span class="todo-priority ${task.priority}">${getPriorityText(task.priority)}</span>
                                    <span>📅 ${new Date(task.dueDate).toLocaleDateString('zh-CN')}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    tasksList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">✅</div>
                            <div class="empty-state-title">没有待办事项</div>
                            <p>所有工作都已完成！</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载待办事项失败:', error);
                // 显示示例待办
                const tasksList = document.getElementById('tasksList');
                tasksList.innerHTML = generateSampleTasks();
            }
        }

        // 生成示例待办
        function generateSampleTasks() {
            const sampleTasks = [
                { title: '完善需求评审流程', priority: 'high', date: '今天' },
                { title: '执行回归测试用例', priority: 'medium', date: '明天' },
                { title: '更新需求文档', priority: 'low', date: '本周' }
            ];
            
            return sampleTasks.map(task => `
                <div class="todo-item">
                    <div class="todo-checkbox" onclick="toggleTask(this)"></div>
                    <div class="todo-content">
                        <div class="todo-title">${task.title}</div>
                        <div class="todo-meta">
                            <span class="todo-priority ${task.priority}">${getPriorityText(task.priority)}</span>
                            <span>📅 ${task.date}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 切换待办状态
        function toggleTask(checkbox, taskId, taskType) {
            checkbox.classList.toggle('checked');
            checkbox.closest('.todo-item').classList.toggle('completed');
            
            // TODO: 调用 API 更新状态
            console.log('切换任务状态:', taskId, taskType);
        }

        // 获取优先级文本
        function getPriorityText(priority) {
            const map = { high: '高', medium: '中', low: '低' };
            return map[priority] || '中';
        }

        // 获取相对时间
        function getTimeAgo(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            if (days < 7) return `${days}天前`;
            return date.toLocaleDateString('zh-CN');
        }

        // 显示所有待办
        function showAllTasks() {
            window.location.href = 'requirements.html?filter=todos';
        }

        // 显示所有活动
        function showAllActivities() {
            window.location.href = 'requirements.html?filter=activities';
        }

        // 快速创建
        function quickCreate(type) {
            const typeMap = {
                requirement: 'requirements.html?action=create-requirement',
                testcase: 'requirements.html?action=create-testcase',
                project: 'projects.html?action=create'
            };
            window.location.href = typeMap[type] || 'requirements.html';
        }

        // 加载需求趋势图
        async function loadRequirementTrendChart() {
            const chartContainer = document.getElementById('requirementTrendChart');
            chartContainer.innerHTML = '<div class="loading">加载图表...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/requirements`);
                const data = await response.json();
                
                if (data.success) {
                    // 按日期分组统计
                    const requirements = data.data;
                    const dateMap = {};
                    
                    // 获取最近 7 天的日期
                    const dates = [];
                    for (let i = 6; i >= 0; i--) {
                        const date = new Date();
                        date.setDate(date.getDate() - i);
                        const dateStr = date.toISOString().split('T')[0];
                        dates.push(dateStr);
                        dateMap[dateStr] = 0;
                    }
                    
                    // 统计每天的需求数
                    requirements.forEach(req => {
                        const dateStr = new Date(req.createdAt).toISOString().split('T')[0];
                        if (dateMap[dateStr] !== undefined) {
                            dateMap[dateStr]++;
                        }
                    });
                    
                    // 生成图表
                    const values = dates.map(d => dateMap[d]);
                    const maxValue = Math.max(...values, 1);
                    
                    chartContainer.innerHTML = `
                        <div style="height: 100%; display: flex; align-items: flex-end; gap: 8px; padding: 10px;">
                            ${dates.map((date, index) => {
                                const height = (values[index] / maxValue) * 100;
                                return `
                                    <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%;">
                                        <div style="font-size: 11px; color: #666; margin-bottom: 4px;">${values[index]}</div>
                                        <div style="width: 100%; height: ${height}%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 4px 4px 0 0; min-height: 20px; transition: height 0.3s;"></div>
                                        <div style="font-size: 10px; color: #999; margin-top: 4px; transform: rotate(-45deg); transform-origin: top; white-space: nowrap;">${date.slice(5)}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <div style="text-align: center; margin-top: 15px; font-size: 12px; color: #666;">
                            📊 最近 7 天需求创建趋势
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载需求趋势失败:', error);
                chartContainer.innerHTML = '<div class="empty-state">图表加载失败</div>';
            }
        }

        // 加载用例执行率图
        async function loadExecutionRateChart() {
            const chartContainer = document.getElementById('executionRateChart');
            chartContainer.innerHTML = '<div class="loading">加载图表...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/testcases`);
                const data = await response.json();
                
                if (data.success) {
                    const testcases = data.data;
                    const total = testcases.length;
                    
                    // 统计不同状态的用例数
                    const stats = {
                        passed: testcases.filter(tc => tc.status === 'passed').length,
                        failed: testcases.filter(tc => tc.status === 'failed').length,
                        not_executed: testcases.filter(tc => tc.status === 'not_executed').length,
                        blocked: testcases.filter(tc => tc.status === 'blocked').length
                    };
                    
                    const executed = stats.passed + stats.failed;
                    const executionRate = total > 0 ? Math.round(executed / total * 100) : 0;
                    const passRate = executed > 0 ? Math.round(stats.passed / executed * 100) : 0;
                    
                    // 生成环形图
                    const circumference = 2 * Math.PI * 80;
                    const executedPercent = (executed / Math.max(total, 1)) * circumference;
                    const passedPercent = (stats.passed / Math.max(executed, 1)) * circumference;
                    
                    chartContainer.innerHTML = `
                        <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
                            <div style="position: relative; width: 200px; height: 200px;">
                                <svg width="200" height="200" style="transform: rotate(-90deg);">
                                    <!-- 背景圆环 -->
                                    <circle cx="100" cy="100" r="80" fill="none" stroke="#f0f0f0" stroke-width="20"/>
                                    <!-- 已执行圆环 -->
                                    <circle cx="100" cy="100" r="80" fill="none" stroke="#667eea" stroke-width="20" 
                                        stroke-dasharray="${circumference}" 
                                        stroke-dashoffset="${circumference - executedPercent}"
                                        stroke-linecap="round"
                                        style="transition: stroke-dashoffset 0.5s ease;"/>
                                    <!-- 通过圆环 (内圈) -->
                                    <circle cx="100" cy="100" r="60" fill="none" stroke="#10b981" stroke-width="15" 
                                        stroke-dasharray="${2 * Math.PI * 60}" 
                                        stroke-dashoffset="${2 * Math.PI * 60 - passedPercent}"
                                        stroke-linecap="round"
                                        style="transition: stroke-dashoffset 0.5s ease;"/>
                                </svg>
                                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
                                    <div style="font-size: 28px; font-weight: bold; color: #667eea;">${executionRate}%</div>
                                    <div style="font-size: 12px; color: #666;">执行率</div>
                                </div>
                            </div>
                        </div>
                        <div style="position: absolute; bottom: 10px; right: 15px; font-size: 11px;">
                            <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 4px;">
                                <span style="width: 10px; height: 10px; background: #667eea; border-radius: 2px;"></span>
                                <span style="color: #666;">已执行：${executed}/${total}</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <span style="width: 10px; height: 10px; background: #10b981; border-radius: 2px;"></span>
                                <span style="color: #666;">通过率：${passRate}%</span>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载执行率失败:', error);
                chartContainer.innerHTML = '<div class="empty-state">图表加载失败</div>';
            }
        }

        // 退出登录
        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
    </script>
