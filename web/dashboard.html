<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 需求管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        .navbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 0 40px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .navbar-brand-icon {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }

        .navbar-user {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            border-radius: 12px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .navbar-user:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
        }

        .navbar-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .navbar-user-info {
            display: flex;
            flex-direction: column;
        }

        .navbar-user-name {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a2e;
        }

        .navbar-user-role {
            font-size: 12px;
            color: #6c757d;
            margin-top: 2px;
        }

        .navbar-user-arrow {
            color: #6c757d;
            font-size: 12px;
            transition: transform 0.3s;
        }

        .navbar-user:hover .navbar-user-arrow {
            transform: rotate(180deg);
        }

        /* 用户下拉菜单 */
        .user-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            min-width: 180px;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001;
        }

        .user-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #1a1a2e;
            text-decoration: none;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            font-size: 14px;
        }

        .dropdown-item:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .dropdown-icon {
            font-size: 16px;
        }

        .dropdown-divider {
            height: 1px;
            background: #e9ecef;
            margin: 0;
        }

        /* 主容器 */
        .main-container {
            margin-top: 70px;
            padding: 40px;
            max-width: 1600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 页面标题 */
        .page-header {
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 32px;
            color: white;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .page-subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
        }

        /* 操作栏 */
        .action-bar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 24px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            display: flex;
            gap: 12px;
        }

        .search-input {
            padding: 12px 20px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 14px;
            width: 320px;
            outline: none;
            transition: all 0.3s;
            background: white;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #1a1a2e;
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 批量操作栏 */
        .bulk-actions {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.2);
        }

        .bulk-actions.show {
            display: flex;
        }

        .bulk-actions-text {
            font-weight: 600;
            color: #92400e;
        }

        /* 表格容器 */
        .table-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .table-header {
            padding: 24px 30px;
            border-bottom: 2px solid #f1f3f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .table-count {
            font-size: 13px;
            color: #6c757d;
            background: #f8f9fa;
            padding: 6px 14px;
            border-radius: 20px;
        }

        .user-table {
            width: 100%;
            border-collapse: collapse;
        }

        .user-table th {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 18px 24px;
            text-align: left;
            font-weight: 700;
            color: #495057;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 2px solid #dee2e6;
        }

        .user-table th:first-child {
            width: 50px;
        }

        .user-table td {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f3f5;
            font-size: 14px;
            color: #1a1a2e;
            transition: background 0.2s;
        }

        .user-table tr:hover {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .user-table tr.selected {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
        }

        /* 复选框样式 */
        .checkbox-custom {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .user-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .user-name {
            font-weight: 600;
            color: #1a1a2e;
        }

        .user-email {
            font-size: 12px;
            color: #6c757d;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            letter-spacing: 0.3px;
        }

        .badge-admin {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #dc2626;
            box-shadow: 0 2px 8px rgba(220, 38, 38, 0.2);
        }

        .badge-user {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            color: #2563eb;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
        }

        .badge-active {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            color: #059669;
            box-shadow: 0 2px 8px rgba(5, 150, 105, 0.2);
        }

        .badge-inactive {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            color: #6b7280;
            box-shadow: 0 2px 8px rgba(107, 114, 128, 0.2);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 16px;
        }

        .btn-edit {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            color: #2563eb;
        }

        .btn-edit:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-delete {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #dc2626;
        }

        .btn-delete:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        /* 分页 */
        .pagination {
            padding: 24px 30px;
            border-top: 2px solid #f1f3f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pagination-info {
            font-size: 14px;
            color: #6c757d;
        }

        .pagination-controls {
            display: flex;
            gap: 8px;
        }

        .pagination-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #e9ecef;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #1a1a2e;
            transition: all 0.3s;
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .pagination-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 540px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-60px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            padding: 28px 32px;
            border-bottom: 2px solid #f1f3f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.3s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .modal-close:hover {
            background: #f1f3f5;
            color: #1a1a2e;
        }

        .modal-body {
            padding: 32px;
        }

        .modal-footer {
            padding: 20px 32px;
            border-top: 2px solid #f1f3f5;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: #f8f9fa;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #1a1a2e;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error {
            border-color: #ef4444;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .form-group .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 8px;
            display: none;
            font-weight: 500;
        }

        .form-group .error-message.show {
            display: block;
        }

        .form-hint {
            font-size: 12px;
            color: #6c757d;
            margin-top: 6px;
        }

        /* 确认对话框 */
        .confirm-icon {
            font-size: 64px;
            text-align: center;
            margin-bottom: 24px;
        }

        .confirm-message {
            text-align: center;
            font-size: 16px;
            color: #495057;
            line-height: 1.6;
        }

        /* Toast 通知 */
        .toast {
            position: fixed;
            top: 100px;
            right: 40px;
            background: white;
            padding: 18px 28px;
            border-radius: 14px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            display: none;
            align-items: center;
            gap: 14px;
            z-index: 3000;
            animation: slideInRight 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 400px;
        }

        .toast.show {
            display: flex;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(400px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast.success {
            border-left: 4px solid #059669;
        }

        .toast.error {
            border-left: 4px solid #dc2626;
        }

        .toast-icon {
            font-size: 24px;
        }

        .toast-message {
            font-weight: 500;
            color: #1a1a2e;
            flex: 1;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 13px;
            color: #6c757d;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-brand-icon">📋</div>
            <div class="navbar-brand-text">需求管理系统</div>
        </div>
        <div class="navbar-user" id="navbarUser" onclick="toggleUserDropdown()">
            <div class="navbar-user-avatar" id="userAvatar">A</div>
            <div class="navbar-user-info">
                <div class="navbar-user-name" id="currentUserName">admin</div>
                <div class="navbar-user-role">管理员</div>
            </div>
            <div class="navbar-user-arrow">▼</div>
            <div class="user-dropdown" id="userDropdown">
                <button class="dropdown-item" onclick="confirmSwitchUser()">
                    <span class="dropdown-icon">🔄</span>
                    切换用户
                </button>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" onclick="confirmLogout()">
                    <span class="dropdown-icon">🚪</span>
                    退出登录
                </button>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">用户管理</h1>
            <p class="page-subtitle">管理系统用户账户和权限配置</p>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-label">总用户数</div>
                <div class="stat-value" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👤</div>
                <div class="stat-label">管理员</div>
                <div class="stat-value" id="totalAdmins">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-label">活跃用户</div>
                <div class="stat-value" id="activeUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏸️</div>
                <div class="stat-label">禁用用户</div>
                <div class="stat-value" id="inactiveUsers">0</div>
            </div>
        </div>

        <!-- 操作栏 -->
        <div class="action-bar">
            <div class="search-box">
                <input 
                    type="text" 
                    class="search-input" 
                    placeholder="搜索用户名、邮箱..."
                    id="searchInput"
                    oninput="searchUsers()"
                >
            </div>
            <button class="btn btn-primary" onclick="openAddModal()">
                <span>➕</span> 添加用户
            </button>
        </div>

        <!-- 批量操作栏 -->
        <div class="bulk-actions" id="bulkActions">
            <div class="bulk-actions-text">
                已选择 <span id="selectedCount">0</span> 个用户
            </div>
            <button class="btn btn-danger" onclick="confirmBulkDelete()">
                <span>🗑️</span> 批量删除
            </button>
        </div>

        <!-- 用户表格 -->
        <div class="table-container">
            <div class="table-header">
                <h3 class="table-title">用户列表</h3>
                <span class="table-count" id="tableCount">共 0 个用户</span>
            </div>
            <table class="user-table">
                <thead>
                    <tr>
                        <th>
                            <input type="checkbox" class="checkbox-custom" id="selectAll" onchange="toggleSelectAll()">
                        </th>
                        <th>用户</th>
                        <th>用户名</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <!-- 动态加载用户数据 -->
                </tbody>
            </table>

            <!-- 分页 -->
            <div class="pagination">
                <div class="pagination-info">
                    显示 <span id="pageStart">0</span> - <span id="pageEnd">0</span> 条，共 <span id="totalItems">0</span> 条
                </div>
                <div class="pagination-controls" id="paginationControls">
                    <!-- 动态生成分页按钮 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑用户模态框 -->
    <div class="modal-overlay" id="userModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">添加用户</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="userForm" novalidate>
                    <input type="hidden" id="editUserId">
                    
                    <div class="form-group">
                        <label for="username">用户名 *</label>
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="请输入用户名"
                            required
                        >
                        <div class="error-message" id="usernameError"></div>
                        <div class="form-hint">3-20 个字符，字母开头，可包含字母、数字和下划线</div>
                    </div>

                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="请输入邮箱地址"
                        >
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">密码 *</label>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="请输入密码"
                            required
                        >
                        <div class="error-message" id="passwordError"></div>
                        <div class="form-hint">至少 6 个字符</div>
                    </div>

                    <div class="form-group">
                        <label for="role">用户类型 *</label>
                        <select id="role" required>
                            <option value="">请选择用户类型</option>
                            <option value="admin">管理员</option>
                            <option value="user">普通用户</option>
                        </select>
                        <div class="error-message" id="roleError"></div>
                    </div>

                    <div class="form-group">
                        <label for="status">状态</label>
                        <select id="status">
                            <option value="active">活跃</option>
                            <option value="inactive">禁用</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <div class="modal-body" style="text-align: center;">
                <div class="confirm-icon" id="confirmIcon">⚠️</div>
                <div class="confirm-message" id="confirmMessage">确定要执行此操作吗？</div>
            </div>
            <div class="modal-footer" style="justify-content: center;">
                <button class="btn btn-secondary" onclick="closeConfirmModal()" style="width: 120px;">取消</button>
                <button class="btn btn-danger" id="confirmBtn" onclick="executeConfirm()" style="width: 120px;">确定</button>
            </div>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast" id="toast">
        <div class="toast-icon" id="toastIcon">✓</div>
        <div class="toast-message" id="toastMessage">操作成功</div>
    </div>

    <script>
        // API 基础地址
        const API_BASE = 'http://8.215.93.217:8001/api';

        // 分页配置
        const PAGE_SIZE = 10;
        let currentPage = 1;

        // 当前用户
        let currentUser = null;

        // 用户数据
        let users = [];
        let filteredUsers = [];

        // 选中的用户
        let selectedUsers = new Set();

        // 确认回调
        let confirmCallback = null;

        // 页面加载时检查登录状态
        window.addEventListener('DOMContentLoaded', async () => {
            // 检查是否已登录
            const savedUser = sessionStorage.getItem('currentUser');
            if (!savedUser) {
                window.location.href = '/login.html';
                return;
            }

            currentUser = JSON.parse(savedUser);
            document.getElementById('currentUserName').textContent = currentUser.username;
            document.getElementById('userAvatar').textContent = currentUser.username.charAt(0).toUpperCase();

            // 加载用户列表
            await loadUsers();
        });

        // 切换用户下拉菜单
        function toggleUserDropdown() {
            const dropdown = document.getElementById('userDropdown');
            dropdown.classList.toggle('show');
        }

        // 点击外部关闭下拉菜单
        document.addEventListener('click', (e) => {
            const navbarUser = document.getElementById('navbarUser');
            const dropdown = document.getElementById('userDropdown');
            if (!navbarUser.contains(e.target)) {
                dropdown.classList.remove('show');
            }
        });

        // 确认切换用户
        function confirmSwitchUser() {
            document.getElementById('confirmIcon').textContent = '🔄';
            document.getElementById('confirmMessage').textContent = '确定要切换用户吗？当前操作将会保存。';
            confirmCallback = () => {
                sessionStorage.removeItem('currentUser');
                window.location.href = '/login.html';
            };
            document.getElementById('confirmModal').classList.add('show');
            toggleUserDropdown();
        }

        // 确认退出登录
        function confirmLogout() {
            document.getElementById('confirmIcon').textContent = '🚪';
            document.getElementById('confirmMessage').textContent = '确定要退出登录吗？';
            confirmCallback = () => {
                sessionStorage.removeItem('currentUser');
                window.location.href = '/login.html';
            };
            document.getElementById('confirmModal').classList.add('show');
            toggleUserDropdown();
        }

        // 关闭确认对话框
        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('show');
            confirmCallback = null;
        }

        // 执行确认操作
        function executeConfirm() {
            if (confirmCallback) {
                confirmCallback();
            }
            closeConfirmModal();
        }

        // 加载用户列表
        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/users`);
                const data = await response.json();
                
                if (data.success) {
                    users = data.data;
                    filteredUsers = [...users];
                    currentPage = 1;
                    renderUserTable();
                    updateStats();
                } else {
                    showToast('加载用户列表失败', 'error');
                }
            } catch (error) {
                console.error('加载用户失败:', error);
                showToast('网络错误，请刷新重试', 'error');
            }
        }

        // 渲染用户表格
        function renderUserTable() {
            const tbody = document.getElementById('userTableBody');
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageUsers = filteredUsers.slice(start, end);

            tbody.innerHTML = pageUsers.map(user => `
                <tr class="${selectedUsers.has(user.id) ? 'selected' : ''}">
                    <td>
                        <input type="checkbox" class="checkbox-custom" 
                            ${selectedUsers.has(user.id) ? 'checked' : ''}
                            onchange="toggleUser('${user.id}')">
                    </td>
                    <td>
                        <div class="user-info">
                            <div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div>
                            <div class="user-details">
                                <div class="user-name">${user.username}</div>
                                <div class="user-email">${user.email || '-'}</div>
                            </div>
                        </div>
                    </td>
                    <td>${user.username}</td>
                    <td>
                        <span class="badge ${user.role === 'admin' ? 'badge-admin' : 'badge-user'}">
                            ${user.role === 'admin' ? '管理员' : '普通用户'}
                        </span>
                    </td>
                    <td>
                        <span class="badge ${user.status === 'active' ? 'badge-active' : 'badge-inactive'}">
                            ${user.status === 'active' ? '活跃' : '禁用'}
                        </span>
                    </td>
                    <td>${formatDate(user.createdAt)}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-icon btn-edit" onclick="editUser('${user.id}')" title="编辑">✏️</button>
                            <button class="btn-icon btn-delete" onclick="confirmDeleteUser('${user.id}')" title="删除">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            updateBulkActions();
            renderPagination();
            updateTableCount();
        }

        // 更新表格计数
        function updateTableCount() {
            document.getElementById('tableCount').textContent = `共 ${filteredUsers.length} 个用户`;
        }

        // 渲染分页
        function renderPagination() {
            const totalPages = Math.ceil(filteredUsers.length / PAGE_SIZE);
            const start = (currentPage - 1) * PAGE_SIZE + 1;
            const end = Math.min(currentPage * PAGE_SIZE, filteredUsers.length);

            document.getElementById('pageStart').textContent = filteredUsers.length > 0 ? start : 0;
            document.getElementById('pageEnd').textContent = end;
            document.getElementById('totalItems').textContent = filteredUsers.length;

            const controls = document.getElementById('paginationControls');
            let html = '';

            // 上一页
            html += `<button class="pagination-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">‹</button>`;

            // 页码
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<button class="pagination-btn" disabled>...</button>`;
                }
            }

            // 下一页
            html += `<button class="pagination-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">›</button>`;

            controls.innerHTML = html;
        }

        // 切换页码
        function changePage(page) {
            const totalPages = Math.ceil(filteredUsers.length / PAGE_SIZE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderUserTable();
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('totalAdmins').textContent = users.filter(u => u.role === 'admin').length;
            document.getElementById('activeUsers').textContent = users.filter(u => u.status === 'active').length;
            document.getElementById('inactiveUsers').textContent = users.filter(u => u.status === 'inactive').length;
        }

        // 搜索用户
        function searchUsers() {
            const text = document.getElementById('searchInput').value.toLowerCase();
            filteredUsers = users.filter(user => {
                if (!text) return true;
                return user.username.toLowerCase().includes(text) || 
                       (user.email && user.email.toLowerCase().includes(text));
            });
            currentPage = 1;
            renderUserTable();
        }

        // 全选/取消全选
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageUsers = filteredUsers.slice(start, end);

            if (selectAll.checked) {
                pageUsers.forEach(user => selectedUsers.add(user.id));
            } else {
                pageUsers.forEach(user => selectedUsers.delete(user.id));
            }

            renderUserTable();
        }

        // 切换单个用户选择
        function toggleUser(userId) {
            if (selectedUsers.has(userId)) {
                selectedUsers.delete(userId);
            } else {
                selectedUsers.add(userId);
            }

            // 更新全选复选框状态
            const selectAll = document.getElementById('selectAll');
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageUsers = filteredUsers.slice(start, end);
            const allSelected = pageUsers.every(user => selectedUsers.has(user.id));
            selectAll.checked = allSelected;

            renderUserTable();
        }

        // 更新批量操作栏
        function updateBulkActions() {
            const bulkActions = document.getElementById('bulkActions');
            const selectedCount = document.getElementById('selectedCount');
            
            if (selectedUsers.size > 0) {
                bulkActions.classList.add('show');
                selectedCount.textContent = selectedUsers.size;
            } else {
                bulkActions.classList.remove('show');
            }
        }

        // 确认批量删除
        function confirmBulkDelete() {
            const adminCount = users.filter(u => selectedUsers.has(u.id) && u.role === 'admin').length;
            const totalCount = selectedUsers.size;

            if (adminCount === users.filter(u => u.role === 'admin').length) {
                showToast('至少保留一个管理员账号', 'error');
                return;
            }

            document.getElementById('confirmIcon').textContent = '🗑️';
            document.getElementById('confirmMessage').textContent = `确定要删除选中的 ${totalCount} 个用户吗？此操作不可恢复。`;
            confirmCallback = bulkDelete;
            document.getElementById('confirmModal').classList.add('show');
        }

        // 批量删除
        async function bulkDelete() {
            const deletePromises = Array.from(selectedUsers).map(userId => 
                fetch(`${API_BASE}/users/${userId}`, { method: 'DELETE' })
            );

            try {
                await Promise.all(deletePromises);
                showToast(`成功删除 ${selectedUsers.size} 个用户`, 'success');
                selectedUsers.clear();
                await loadUsers();
            } catch (error) {
                console.error('批量删除失败:', error);
                showToast('删除失败，请重试', 'error');
            }
        }

        // 打开添加模态框
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '添加用户';
            document.getElementById('userForm').reset();
            document.getElementById('editUserId').value = '';
            document.getElementById('password').required = true;
            clearFormErrors();
            document.getElementById('userModal').classList.add('show');
        }

        // 编辑用户
        function editUser(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;

            document.getElementById('modalTitle').textContent = '编辑用户';
            document.getElementById('editUserId').value = user.id;
            document.getElementById('username').value = user.username;
            document.getElementById('email').value = user.email || '';
            document.getElementById('password').value = '';
            document.getElementById('password').placeholder = '留空则不修改密码';
            document.getElementById('password').required = false;
            document.getElementById('role').value = user.role;
            document.getElementById('status').value = user.status;

            clearFormErrors();
            document.getElementById('userModal').classList.add('show');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('userModal').classList.remove('show');
            clearFormErrors();
        }

        // 保存用户
        async function saveUser() {
            clearFormErrors();

            const userId = document.getElementById('editUserId').value;
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const status = document.getElementById('status').value;

            // 验证
            let isValid = true;

            if (!username) {
                showFieldError('username', '用户名不能为空');
                isValid = false;
            } else if (username.length < 3 || username.length > 20) {
                showFieldError('username', '用户名长度必须在 3-20 个字符之间');
                isValid = false;
            } else if (!/^[a-zA-Z][a-zA-Z0-9_]*$/.test(username)) {
                showFieldError('username', '用户名必须以字母开头，只能包含字母、数字和下划线');
                isValid = false;
            }

            if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showFieldError('email', '邮箱格式不正确');
                isValid = false;
            }

            if (!userId && !password) {
                showFieldError('password', '密码不能为空');
                isValid = false;
            } else if (password && password.length < 6) {
                showFieldError('password', '密码至少 6 个字符');
                isValid = false;
            }

            if (!role) {
                showFieldError('role', '请选择用户类型');
                isValid = false;
            }

            if (!isValid) return;

            const userData = {
                username,
                email,
                role,
                status
            };

            if (password) {
                userData.password = password;
            }

            try {
                const url = userId ? `${API_BASE}/users/${userId}` : `${API_BASE}/users`;
                const method = userId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                if (data.success) {
                    showToast(userId ? '用户更新成功' : '用户添加成功', 'success');
                    closeModal();
                    await loadUsers();
                } else {
                    showToast(data.message || '操作失败', 'error');
                }
            } catch (error) {
                console.error('保存用户失败:', error);
                showToast('网络错误，请重试', 'error');
            }
        }

        // 确认删除用户
        function confirmDeleteUser(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;

            // 检查是否是最后一个管理员
            const adminCount = users.filter(u => u.role === 'admin').length;
            if (user.role === 'admin' && adminCount === 1) {
                showToast('至少保留一个管理员账号', 'error');
                return;
            }

            document.getElementById('confirmIcon').textContent = '🗑️';
            document.getElementById('confirmMessage').textContent = `确定要删除用户 "${user.username}" 吗？此操作不可恢复。`;
            confirmCallback = () => deleteUser(userId);
            document.getElementById('confirmModal').classList.add('show');
        }

        // 删除用户
        async function deleteUser(userId) {
            try {
                const response = await fetch(`${API_BASE}/users/${userId}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    showToast('用户已删除', 'success');
                    await loadUsers();
                } else {
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (error) {
                console.error('删除用户失败:', error);
                showToast('网络错误，请重试', 'error');
            }
        }

        // 显示字段错误
        function showFieldError(fieldId, message) {
            const input = document.getElementById(fieldId);
            const errorDiv = document.getElementById(`${fieldId}Error`);
            
            input.classList.add('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        // 清除表单错误
        function clearFormErrors() {
            const inputs = document.querySelectorAll('#userForm input, #userForm select');
            const errorDivs = document.querySelectorAll('#userForm .error-message');
            
            inputs.forEach(input => {
                input.classList.remove('error');
                input.style.borderColor = '';
            });
            
            errorDivs.forEach(div => {
                div.classList.remove('show');
            });
        }

        // 显示 Toast 通知
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');

            toastIcon.textContent = type === 'success' ? '✓' : '✕';
            toastMessage.textContent = message;
            toast.className = `toast ${type} show`;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
