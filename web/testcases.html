<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用例管理 - 需求管理系统</title>
    <!-- Quill 编辑器样式 -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 20px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 32px;
        }

        .logo h1 {
            font-size: 24px;
            color: #333;
            font-weight: 600;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .current-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #e1e1e1;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-outline {
            background: transparent;
            color: #667eea;
            border: 1px solid #667eea;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 14px;
        }

        .main-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .content-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 15px;
            color: #666;
            border-radius: 8px 8px 0 0;
            transition: all 0.2s;
        }

        .tab:hover {
            background: #f5f5f5;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .project-select {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .project-select select {
            padding: 8px 12px;
            border: 1px solid #e1e1e1;
            border-radius: 6px;
            font-size: 14px;
            min-width: 200px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .batch-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .selected-count {
            color: #667eea;
            font-weight: 500;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #f0f0f0;
        }

        .modal-header h2 {
            font-size: 20px;
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-body {
            padding: 30px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 20px 30px;
            border-top: 1px solid #f0f0f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e1e1e1;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .editor-container {
            min-height: 300px;
            border: 1px solid #e1e1e1;
            border-radius: 6px;
            overflow: hidden;
        }

        .editor-container .ql-toolbar {
            border: none !important;
            border-bottom: 1px solid #e1e1e1 !important;
            background: #f8f9fa;
        }

        .editor-container .ql-container {
            border: none !important;
        }

        .attachment-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .attachment-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 13px;
        }

        .attachment-item .remove-btn {
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
        }

        .prefix-btn-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .prefix-btn {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: 1px solid #e1e1e1;
            background: #f5f5f5;
            cursor: pointer;
            transition: all 0.2s;
        }

        .prefix-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .prefix-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #10b981;
        }

        .toast.error {
            background: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .template-card {
            border: 2px solid #e1e1e1;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .template-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .template-card h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #333;
        }

        .template-card p {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        .template-card .template-meta {
            margin-top: 12px;
            font-size: 12px;
            color: #999;
        }

        .import-area {
            border: 2px dashed #e1e1e1;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
        }

        .import-area.dragover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .import-area-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .ql-snow .ql-editor {
            min-height: 200px;
        }

        .ql-editor table {
            border-collapse: collapse;
            width: 100%;
        }

        .ql-editor table td,
        .ql-editor table th {
            border: 1px solid #ccc;
            padding: 8px;
        }

        .ql-editor img,
        .ql-editor video {
            max-width: 100%;
            height: auto;
        }

        .ql-editor pre.ql-syntax {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Consolas', 'Monaco', monospace;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🧪</span>
            <h1>用例管理系统</h1>
        </div>
        <div class="user-menu">
            <div class="current-user">
                <div class="user-avatar" id="userAvatar"></div>
                <span id="currentUsername"></span>
            </div>
            <button class="btn-danger" onclick="logout()">退出登录</button>
        </div>
    </header>

    <div class="main-container">
        <div class="content-card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('testcases')">用例列表</button>
                <button class="tab" onclick="switchTab('templates')">用例模板</button>
                <button class="tab" onclick="switchTab('import')">批量导入</button>
                <button class="tab" onclick="switchTab('export')">批量导出</button>
            </div>

            <div class="toolbar">
                <div class="project-select">
                    <label>选择项目：</label>
                    <select id="projectSelect" onchange="loadData()">
                        <option value="">请选择项目...</option>
                    </select>
                </div>
                <div class="action-buttons" id="actionButtons">
                    <button class="btn-primary" onclick="showTestcaseModal()">+ 新建用例</button>
                    <button class="btn-secondary" onclick="showTemplateModal()">📋 使用模板</button>
                    <button class="btn-secondary" onclick="exportToExcel()">📊 导出 Excel</button>
                    <button class="btn-secondary" onclick="showImportModal()">📥 导入</button>
                </div>
            </div>

            <!-- 批量操作栏 -->
            <div id="batchActions" class="batch-actions" style="display: none;">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                    <label for="selectAll">全选</label>
                </div>
                <button class="btn-secondary btn-sm" onclick="toggleSelectInverse()">反选</button>
                <span class="selected-count" id="selectedCount">已选 0 项</span>
                <div style="flex: 1;"></div>
                <button class="btn-primary btn-sm" onclick="batchExport()">📊 批量导出</button>
                <button class="btn-danger btn-sm" onclick="batchDelete()">🗑️ 批量删除</button>
            </div>

            <!-- 用例列表 -->
            <div id="testcasesView">
                <div class="table-container">
                    <table id="testcasesTable">
                        <thead>
                            <tr>
                                <th style="width: 50px;"><input type="checkbox" id="selectAllTc" onchange="toggleSelectAllTc()"></th>
                                <th style="width: 100px;">ID</th>
                                <th>操作步骤</th>
                                <th style="width: 250px;">预期结果</th>
                                <th style="width: 180px;">创建时间</th>
                                <th style="width: 200px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="testcasesBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 用例模板 -->
            <div id="templatesView" style="display: none;">
                <div class="toolbar">
                    <button class="btn-primary" onclick="showCreateTemplateModal()">+ 创建模板</button>
                </div>
                <div class="template-grid" id="templateGrid"></div>
            </div>

            <!-- 批量导入 -->
            <div id="importView" style="display: none;">
                <div class="import-area" id="importArea">
                    <div class="import-area-icon">📥</div>
                    <h3>拖拽 Excel 文件到此处</h3>
                    <p>或点击选择文件（支持 .xlsx, .xls 格式）</p>
                    <input type="file" id="importFile" accept=".xlsx,.xls" style="display: none;" onchange="handleFileSelect(event)">
                    <button class="btn-primary" style="margin-top: 20px;" onclick="document.getElementById('importFile').click()">选择文件</button>
                </div>
                <div id="importPreview" style="margin-top: 20px;"></div>
            </div>

            <!-- 批量导出 -->
            <div id="exportView" style="display: none;">
                <div class="form-group">
                    <label>导出格式</label>
                    <div style="display: flex; gap: 15px; margin-top: 10px;">
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="radio" name="exportFormat" value="excel" checked>
                            Excel (.xlsx)
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="radio" name="exportFormat" value="csv">
                            CSV
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="radio" name="exportFormat" value="json">
                            JSON
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label>导出范围</label>
                    <div style="display: flex; gap: 15px; margin-top: 10px;">
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="radio" name="exportScope" value="all" checked>
                            全部用例
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="radio" name="exportScope" value="selected">
                            已选用例
                        </label>
                    </div>
                </div>
                <button class="btn-primary" onclick="performExport()">开始导出</button>
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📁</div>
                <h3>请先选择或创建一个项目</h3>
                <p>在项目管理系统中创建项目后，即可开始编写测试用例</p>
            </div>
        </div>
    </div>

    <!-- 用例模态框 -->
    <div class="modal-overlay" id="testcaseModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="testcaseModalTitle">新建用例</h2>
                <button class="close-btn" onclick="closeModal('testcaseModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>所属标题（可选）</label>
                    <select id="tcHeader">
                        <option value="">无（顶层用例）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ID 前缀</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="tcPrefix" placeholder="例如：TC" value="TC" style="flex: 1;">
                    </div>
                    <div class="prefix-btn-group" id="tcPrefixBtns">
                        <button class="prefix-btn active" onclick="setPrefix('TC', this)">TC</button>
                        <button class="prefix-btn" onclick="setPrefix('CASE', this)">CASE</button>
                        <button class="prefix-btn" onclick="setPrefix('UT', this)">UT</button>
                        <button class="prefix-btn" onclick="setPrefix('IT', this)">IT</button>
                        <button class="prefix-btn" onclick="setPrefix('E2E', this)">E2E</button>
                        <button class="prefix-btn" onclick="setPrefix('', this)">无前缀</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>操作步骤（富文本）</label>
                    <div id="tcEditor" class="editor-container"></div>
                    <input type="hidden" id="tcSteps">
                </div>
                <div class="form-group">
                    <label>预期结果</label>
                    <textarea id="tcResult" placeholder="请输入预期结果（可选）" style="min-height: 80px;"></textarea>
                </div>
                <div class="form-group">
                    <label>附件上传</label>
                    <input type="file" id="tcFileInput" multiple style="margin-bottom: 10px;">
                    <div id="tcAttachments" class="attachment-list"></div>
                </div>
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="saveTcPrefix">
                        将此前缀设为默认前缀
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-outline" onclick="closeModal('testcaseModal')">取消</button>
                <button class="btn-primary" onclick="saveTestcase()">保存用例</button>
            </div>
        </div>
    </div>

    <!-- 模板选择模态框 -->
    <div class="modal-overlay" id="templateModal">
        <div class="modal">
            <div class="modal-header">
                <h2>选择用例模板</h2>
                <button class="close-btn" onclick="closeModal('templateModal')">×</button>
            </div>
            <div class="modal-body">
                <p style="color: #666; margin-bottom: 20px;">选择一个模板作为起点，然后根据需要修改</p>
                <div class="template-grid" id="templateSelectionGrid"></div>
            </div>
        </div>
    </div>

    <!-- 创建模板模态框 -->
    <div class="modal-overlay" id="createTemplateModal">
        <div class="modal">
            <div class="modal-header">
                <h2>创建用例模板</h2>
                <button class="close-btn" onclick="closeModal('createTemplateModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>模板名称 *</label>
                    <input type="text" id="templateName" placeholder="例如：功能测试模板">
                </div>
                <div class="form-group">
                    <label>模板描述</label>
                    <textarea id="templateDesc" placeholder="描述此模板的用途（可选）"></textarea>
                </div>
                <div class="form-group">
                    <label>操作步骤模板（富文本）</label>
                    <div id="templateStepsEditor" class="editor-container"></div>
                </div>
                <div class="form-group">
                    <label>预期结果模板</label>
                    <textarea id="templateResult" placeholder="预期结果模板（可选）" style="min-height: 80px;"></textarea>
                </div>
                <div class="form-group">
                    <label>适用场景</label>
                    <input type="text" id="templateScenarios" placeholder="例如：功能测试、回归测试、冒烟测试">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-outline" onclick="closeModal('createTemplateModal')">取消</button>
                <button class="btn-primary" onclick="saveTemplate()">创建模板</button>
            </div>
        </div>
    </div>

    <!-- 导入模态框 -->
    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <div class="modal-header">
                <h2>导入用例</h2>
                <button class="close-btn" onclick="closeModal('importModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="import-area" id="importModalArea">
                    <div class="import-area-icon">📥</div>
                    <h3>拖拽 Excel 文件到此处</h3>
                    <p>支持格式：.xlsx, .xls</p>
                    <p style="font-size: 13px; color: #999; margin-top: 10px;">Excel 应包含列：ID, 操作步骤，预期结果，优先级，备注</p>
                    <input type="file" id="importModalFile" accept=".xlsx,.xls" style="display: none;" onchange="handleModalFileSelect(event)">
                    <button class="btn-primary" style="margin-top: 20px;" onclick="document.getElementById('importModalFile').click()">选择文件</button>
                </div>
                <div id="importModalPreview" style="margin-top: 20px; max-height: 400px; overflow-y: auto;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-outline" onclick="closeModal('importModal')">取消</button>
                <button class="btn-primary" onclick="confirmImport()" id="confirmImportBtn" disabled>确认导入</button>
            </div>
        </div>
    </div>

    <!-- 历史记录模态框 -->
    <div class="modal-overlay" id="historyModal">
        <div class="modal">
            <div class="modal-header">
                <h2>用例历史</h2>
                <button class="close-btn" onclick="closeModal('historyModal')">×</button>
            </div>
            <div class="modal-body">
                <div id="historyList" style="max-height: 500px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Quill 编辑器脚本 -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <!-- SheetJS for Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script>
        const API_BASE = 'http://8.215.93.217:8001/api';
        let currentUser = null;
        let currentProjectId = '';
        let testcasesData = [];
        let headersData = [];
        let selectedTcs = new Set();
        let tcEditor = null;
        let templateStepsEditor = null;
        let tcAttachments = [];
        let templates = [];
        let importData = null;
        let editingTestcaseId = null;

        // 默认模板
        const DEFAULT_TEMPLATES = [
            {
                id: 'default_functional',
                name: '功能测试模板',
                description: '适用于常规功能测试场景',
                steps: '<p>1. 打开系统/页面</p><p>2. 输入/点击...</p><p>3. 验证结果</p>',
                result: '系统响应符合预期',
                scenarios: '功能测试，回归测试'
            },
            {
                id: 'default_login',
                name: '登录测试模板',
                description: '用户登录相关测试场景',
                steps: '<p>1. 打开登录页面</p><p>2. 输入用户名和密码</p><p>3. 点击登录按钮</p><p>4. 验证登录结果</p>',
                result: '成功登录并跳转到首页',
                scenarios: '登录测试，认证测试'
            },
            {
                id: 'default_api',
                name: 'API 测试模板',
                description: '接口测试场景',
                steps: '<p>1. 准备测试数据</p><p>2. 发送 HTTP 请求</p><p>3. 验证响应状态码</p><p>4. 验证响应数据</p>',
                result: 'API 返回预期数据',
                scenarios: '接口测试，集成测试'
            },
            {
                id: 'default_ui',
                name: 'UI 测试模板',
                description: '界面和交互测试',
                steps: '<p>1. 打开目标页面</p><p>2. 检查页面元素</p><p>3. 执行交互操作</p><p>4. 验证界面变化</p>',
                result: '界面显示和交互正常',
                scenarios: 'UI 测试，兼容性测试'
            },
            {
                id: 'default_performance',
                name: '性能测试模板',
                description: '性能和负载测试',
                steps: '<p>1. 设置并发用户数</p><p>2. 执行压力测试</p><p>3. 监控系统指标</p><p>4. 分析性能数据</p>',
                result: '系统性能指标符合要求',
                scenarios: '性能测试，负载测试'
            },
            {
                id: 'default_security',
                name: '安全测试模板',
                description: '安全性测试场景',
                steps: '<p>1. 识别测试目标</p><p>2. 执行安全扫描</p><p>3. 尝试漏洞利用</p><p>4. 验证防护措施</p>',
                result: '系统安全防护有效',
                scenarios: '安全测试，渗透测试'
            }
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadProjects();
            initEditors();
            loadTemplates();
        });

        // 检查登录状态
        function checkAuth() {
            const user = localStorage.getItem('currentUser');
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = JSON.parse(user);
            document.getElementById('currentUsername').textContent = currentUser.username;
            document.getElementById('userAvatar').textContent = currentUser.username.charAt(0).toUpperCase();
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        // 初始化编辑器
        function initEditors() {
            const editorOptions = {
                theme: 'snow',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'color': [] }, { 'background': [] }],
                        [{ 'font': [] }],
                        [{ 'align': [] }],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        [{ 'indent': '-1'}, { 'indent': '+1' }],
                        ['link', 'image', 'video'],
                        ['table'],
                        ['code-block'],
                        ['clean']
                    ]
                }
            };

            tcEditor = new Quill('#tcEditor', editorOptions);
            templateStepsEditor = new Quill('#templateStepsEditor', editorOptions);

            setupFileUpload('tcFileInput', tcAttachments, 'tcAttachments');
        }

        // 文件上传处理
        async function setupFileUpload(inputId, attachmentsArray, containerId) {
            const input = document.getElementById(inputId);
            if (!input) return;
            
            input.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                const formData = new FormData();
                files.forEach(file => formData.append('file', file));

                try {
                    const response = await fetch(`${API_BASE}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        attachmentsArray.push(...data.data);
                        renderAttachments(attachmentsArray, containerId);
                        
                        data.data.forEach(file => {
                            if (file.mimeType.startsWith('image/')) {
                                const range = tcEditor.getSelection();
                                tcEditor.insertEmbed(range.index, 'image', file.url);
                            }
                        });
                        
                        showToast(`上传成功 ${data.data.length} 个文件`, 'success');
                    }
                } catch (error) {
                    console.error('上传失败:', error);
                    showToast('上传失败', 'error');
                }
                
                input.value = '';
            });
        }

        // 渲染附件列表
        function renderAttachments(attachments, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.innerHTML = attachments.map((file, index) => `
                <div class="attachment-item">
                    <span>📎 ${file.originalName}</span>
                    <span class="remove-btn" onclick="removeAttachment(${index}, '${containerId}')">×</span>
                </div>
            `).join('');
        }

        // 删除附件
        function removeAttachment(index, containerId) {
            if (containerId === 'tcAttachments') {
                tcAttachments.splice(index, 1);
                renderAttachments(tcAttachments, containerId);
            }
        }

        // 加载项目列表
        async function loadProjects() {
            try {
                const response = await fetch(`${API_BASE}/projects`);
                const data = await response.json();
                
                if (data.success) {
                    const select = document.getElementById('projectSelect');
                    select.innerHTML = '<option value="">请选择项目...</option>' + 
                        data.data.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
                }
            } catch (error) {
                console.error('加载项目失败:', error);
            }
        }

        // 加载数据
        async function loadData() {
            const projectId = document.getElementById('projectSelect').value;
            currentProjectId = projectId;

            if (!projectId) {
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('testcasesView').style.display = 'none';
                return;
            }

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('testcasesView').style.display = 'block';

            try {
                const [tcRes, headerRes] = await Promise.all([
                    fetch(`${API_BASE}/testcases?projectId=${projectId}`),
                    fetch(`${API_BASE}/headers?projectId=${projectId}`)
                ]);

                const tcData = await tcRes.json();
                const headerData = await headerRes.json();

                if (tcData.success) {
                    testcasesData = tcData.data;
                    renderTestcases();
                }

                if (headerData.success) {
                    headersData = headerData.data;
                    updateHeaderSelect();
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                showToast('加载数据失败', 'error');
            }
        }

        // 渲染用例列表
        function renderTestcases() {
            const tbody = document.getElementById('testcasesBody');
            
            if (testcasesData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: #999;">暂无用例，点击右上角"+ 新建用例"开始创建</td></tr>';
                return;
            }

            tbody.innerHTML = testcasesData.map(tc => {
                const stepsText = tc.richContent ? stripHtml(tc.richContent) : (tc.steps || '');
                const truncatedSteps = stepsText.length > 100 ? stepsText.substring(0, 100) + '...' : stepsText;
                
                return `
                    <tr>
                        <td><input type="checkbox" class="tc-checkbox" value="${tc.id}" onchange="updateSelectedCount()"></td>
                        <td><strong>${tc.tcId}</strong></td>
                        <td>${truncatedSteps}</td>
                        <td>${tc.expectedResult || '-'}</td>
                        <td>${formatDate(tc.createdAt)}</td>
                        <td>
                            <button class="btn-primary btn-sm" onclick="editTestcase('${tc.id}')">编辑</button>
                            <button class="btn-secondary btn-sm" onclick="viewHistory('${tc.id}')">历史</button>
                            <button class="btn-danger btn-sm" onclick="deleteTestcase('${tc.id}')">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 更新标题选择器
        function updateHeaderSelect() {
            const select = document.getElementById('tcHeader');
            select.innerHTML = '<option value="">无（顶层用例）</option>' + 
                headersData.map(h => `<option value="${h.id}">${h.name}</option>`).join('');
        }

        // 显示用例模态框
        function showTestcaseModal(testcase = null) {
            editingTestcaseId = testcase ? testcase.id : null;
            document.getElementById('testcaseModalTitle').textContent = testcase ? '编辑用例' : '新建用例';
            
            if (testcase) {
                document.getElementById('tcPrefix').value = testcase.prefix || 'TC';
                document.getElementById('tcHeader').value = testcase.headerId || '';
                if (tcEditor && testcase.richContent) {
                    tcEditor.root.innerHTML = testcase.richContent;
                }
                document.getElementById('tcResult').value = testcase.expectedResult || '';
                tcAttachments = testcase.attachments || [];
                renderAttachments(tcAttachments, 'tcAttachments');
            } else {
                document.getElementById('tcPrefix').value = 'TC';
                document.getElementById('tcHeader').value = '';
                if (tcEditor) {
                    tcEditor.root.innerHTML = '';
                }
                document.getElementById('tcResult').value = '';
                tcAttachments = [];
                renderAttachments(tcAttachments, 'tcAttachments');
            }

            openModal('testcaseModal');
        }

        // 编辑用例
        function editTestcase(id) {
            const testcase = testcasesData.find(t => t.id === id);
            if (testcase) {
                showTestcaseModal(testcase);
            }
        }

        // 保存用例
        async function saveTestcase() {
            const prefix = document.getElementById('tcPrefix').value.trim();
            const headerId = document.getElementById('tcHeader').value;
            const richContent = tcEditor.root.innerHTML;
            const expectedResult = document.getElementById('tcResult').value.trim();
            const savePrefix = document.getElementById('saveTcPrefix').checked;

            if (!richContent || richContent === '<p><br></p>') {
                showToast('请输入操作步骤', 'error');
                return;
            }

            const payload = {
                projectId: currentProjectId,
                prefix: prefix || 'TC',
                richContent,
                expectedResult,
                headerId: headerId || null,
                attachments: tcAttachments,
                savePrefix
            };

            try {
                const url = editingTestcaseId 
                    ? `${API_BASE}/testcases/${editingTestcaseId}`
                    : `${API_BASE}/testcases`;
                
                const method = editingTestcaseId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {
                    showToast(editingTestcaseId ? '用例更新成功' : '用例创建成功', 'success');
                    closeModal('testcaseModal');
                    loadData();
                } else {
                    showToast(data.message || '操作失败', 'error');
                }
            } catch (error) {
                console.error('保存失败:', error);
                showToast('保存失败', 'error');
            }
        }

        // 删除用例
        async function deleteTestcase(id) {
            if (!confirm('确定要删除此用例吗？此操作不可恢复。')) return;

            try {
                const response = await fetch(`${API_BASE}/testcases/${id}`, { method: 'DELETE' });
                const data = await response.json();

                if (data.success) {
                    showToast('用例已删除', 'success');
                    loadData();
                } else {
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (error) {
                console.error('删除失败:', error);
                showToast('删除失败', 'error');
            }
        }

        // 批量选择
        function toggleSelectAllTc() {
            const checkbox = document.getElementById('selectAllTc');
            const checkboxes = document.querySelectorAll('.tc-checkbox');
            checkboxes.forEach(cb => cb.checked = checkbox.checked);
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const checkboxes = document.querySelectorAll('.tc-checkbox:checked');
            document.getElementById('selectedCount').textContent = `已选 ${checkboxes.length} 项`;
            
            const batchActions = document.getElementById('batchActions');
            batchActions.style.display = checkboxes.length > 0 ? 'flex' : 'none';
        }

        function toggleSelectInverse() {
            const checkboxes = document.querySelectorAll('.tc-checkbox');
            checkboxes.forEach(cb => cb.checked = !cb.checked);
            updateSelectedCount();
        }

        // 批量删除
        async function batchDelete() {
            const checkboxes = document.querySelectorAll('.tc-checkbox:checked');
            const ids = Array.from(checkboxes).map(cb => cb.value);

            if (!confirm(`确定要删除选中的 ${ids.length} 个用例吗？`)) return;

            try {
                for (const id of ids) {
                    await fetch(`${API_BASE}/testcases/${id}`, { method: 'DELETE' });
                }
                showToast(`已删除 ${ids.length} 个用例`, 'success');
                loadData();
            } catch (error) {
                console.error('批量删除失败:', error);
                showToast('批量删除失败', 'error');
            }
        }

        // 导出 Excel
        function exportToExcel() {
            if (testcasesData.length === 0) {
                showToast('没有可导出的用例', 'error');
                return;
            }

            const data = testcasesData.map(tc => ({
                '用例 ID': tc.tcId,
                '操作步骤': stripHtml(tc.richContent || tc.steps || ''),
                '预期结果': tc.expectedResult || '',
                '创建时间': formatDate(tc.createdAt),
                '更新时间': formatDate(tc.updatedAt)
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '测试用例');

            XLSX.writeFile(wb, `测试用例_${currentProjectId}_${new Date().toISOString().split('T')[0]}.xlsx`);
            showToast('导出成功', 'success');
        }

        // 模板管理
        function loadTemplates() {
            templates = [...DEFAULT_TEMPLATES];
            const saved = localStorage.getItem('customTemplates');
            if (saved) {
                try {
                    const custom = JSON.parse(saved);
                    templates.push(...custom);
                } catch (e) {}
            }
            renderTemplates();
        }

        function renderTemplates() {
            const grid = document.getElementById('templateGrid');
            grid.innerHTML = templates.map(t => `
                <div class="template-card" onclick="useTemplate('${t.id}')">
                    <h3>${t.name}</h3>
                    <p>${t.description || ''}</p>
                    <div class="template-meta">适用：${t.scenarios || '通用'}</div>
                </div>
            `).join('');
        }

        function useTemplate(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (template) {
                showTestcaseModal();
                if (tcEditor && template.steps) {
                    tcEditor.root.innerHTML = template.steps;
                }
                document.getElementById('tcResult').value = template.result || '';
                showToast(`已应用模板：${template.name}`, 'success');
            }
        }

        function showTemplateModal() {
            const grid = document.getElementById('templateSelectionGrid');
            grid.innerHTML = templates.map(t => `
                <div class="template-card" onclick="useTemplateAndClose('${t.id}')">
                    <h3>${t.name}</h3>
                    <p>${t.description || ''}</p>
                    <div class="template-meta">适用：${t.scenarios || '通用'}</div>
                </div>
            `).join('');
            openModal('templateModal');
        }

        function useTemplateAndClose(templateId) {
            useTemplate(templateId);
            closeModal('templateModal');
        }

        function showCreateTemplateModal() {
            if (templateStepsEditor) {
                templateStepsEditor.root.innerHTML = '';
            }
            document.getElementById('templateName').value = '';
            document.getElementById('templateDesc').value = '';
            document.getElementById('templateResult').value = '';
            document.getElementById('templateScenarios').value = '';
            openModal('createTemplateModal');
        }

        function saveTemplate() {
            const name = document.getElementById('templateName').value.trim();
            const desc = document.getElementById('templateDesc').value.trim();
            const steps = templateStepsEditor.root.innerHTML;
            const result = document.getElementById('templateResult').value.trim();
            const scenarios = document.getElementById('templateScenarios').value.trim();

            if (!name) {
                showToast('请输入模板名称', 'error');
                return;
            }

            const newTemplate = {
                id: 'custom_' + Date.now(),
                name,
                description: desc,
                steps,
                result,
                scenarios
            };

            const saved = localStorage.getItem('customTemplates');
            const custom = saved ? JSON.parse(saved) : [];
            custom.push(newTemplate);
            localStorage.setItem('customTemplates', JSON.stringify(custom));

            templates.push(newTemplate);
            renderTemplates();
            closeModal('createTemplateModal');
            showToast('模板创建成功', 'success');
        }

        // 导入功能
        function showImportModal() {
            openModal('importModal');
            importData = null;
            document.getElementById('confirmImportBtn').disabled = true;
            document.getElementById('importModalPreview').innerHTML = '';
        }

        function handleModalFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            processImportFile(file);
        }

        async function processImportFile(file) {
            try {
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data);
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);

                importData = jsonData;
                
                const preview = document.getElementById('importModalPreview');
                preview.innerHTML = `
                    <h4>预览（${jsonData.length} 条记录）</h4>
                    <table style="width: 100%; font-size: 13px;">
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th>操作步骤</th>
                                <th>预期结果</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${jsonData.slice(0, 10).map((row, i) => `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td>${row['操作步骤'] || row['steps'] || '-'}</td>
                                    <td>${row['预期结果'] || row['expectedResult'] || '-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    ${jsonData.length > 10 ? `<p style="color: #999; margin-top: 10px;">... 还有 ${jsonData.length - 10} 条记录</p>` : ''}
                `;

                document.getElementById('confirmImportBtn').disabled = false;
                showToast(`读取成功 ${jsonData.length} 条记录`, 'success');
            } catch (error) {
                console.error('导入失败:', error);
                showToast('文件解析失败', 'error');
            }
        }

        async function confirmImport() {
            if (!importData || importData.length === 0) return;

            try {
                let successCount = 0;
                for (const row of importData) {
                    const payload = {
                        projectId: currentProjectId,
                        prefix: 'TC',
                        richContent: row['操作步骤'] || row['steps'] || '',
                        expectedResult: row['预期结果'] || row['expectedResult'] || '',
                        attachments: []
                    };

                    const response = await fetch(`${API_BASE}/testcases`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();
                    if (result.success) successCount++;
                }

                showToast(`导入完成：成功 ${successCount}/${importData.length} 条`, 'success');
                closeModal('importModal');
                loadData();
            } catch (error) {
                console.error('导入失败:', error);
                showToast('导入失败', 'error');
            }
        }

        // 历史记录
        async function viewHistory(testcaseId) {
            try {
                const response = await fetch(`${API_BASE}/history?type=testcase&itemId=${testcaseId}&limit=50`);
                const data = await response.json();

                if (data.success) {
                    const historyList = document.getElementById('historyList');
                    if (data.data.length === 0) {
                        historyList.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">暂无历史记录</p>';
                    } else {
                        historyList.innerHTML = data.data.map(h => `
                            <div style="padding: 15px; border-bottom: 1px solid #f0f0f0;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                    <strong>${h.action === 'create' ? '创建' : h.action === 'update' ? '更新' : '删除'}</strong>
                                    <span style="color: #999;">${formatDate(h.timestamp)}</span>
                                </div>
                                <div style="font-size: 13px; color: #666;">
                                    操作人：${h.userId || '系统'}
                                </div>
                            </div>
                        `).join('');
                    }
                    openModal('historyModal');
                }
            } catch (error) {
                console.error('加载历史失败:', error);
                showToast('加载历史失败', 'error');
            }
        }

        // 工具函数
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function setPrefix(prefix, btn) {
            document.getElementById('tcPrefix').value = prefix;
            document.querySelectorAll('#tcPrefixBtns .prefix-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function stripHtml(html) {
            const tmp = document.createElement('DIV');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Tab 切换
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('testcasesView').style.display = 'none';
            document.getElementById('templatesView').style.display = 'none';
            document.getElementById('importView').style.display = 'none';
            document.getElementById('exportView').style.display = 'none';

            if (tab === 'testcases') {
                document.getElementById('testcasesView').style.display = 'block';
            } else if (tab === 'templates') {
                document.getElementById('templatesView').style.display = 'block';
            } else if (tab === 'import') {
                document.getElementById('importView').style.display = 'block';
            } else if (tab === 'export') {
                document.getElementById('exportView').style.display = 'block';
            }
        }

        // 拖拽导入
        const importArea = document.getElementById('importArea');
        if (importArea) {
            importArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                importArea.classList.add('dragover');
            });

            importArea.addEventListener('dragleave', () => {
                importArea.classList.remove('dragover');
            });

            importArea.addEventListener('drop', (e) => {
                e.preventDefault();
                importArea.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file && (file.name.endsWith('.xlsx') || file.name.endsWith('.xls'))) {
                    processImportFile(file);
                } else {
                    showToast('请上传 Excel 文件', 'error');
                }
            });
        }
    </script>
</body>
</html>
